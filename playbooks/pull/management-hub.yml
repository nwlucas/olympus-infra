---
# Pull-mode playbook for management-hub
# Runs daily at 02:00 via crontab as the ansible user.
# Re-applies idempotent Ansible-managed foundation roles to correct drift.
#
# NOTE: cert-manager, external-secrets, traefik-config, external-dns, and
# cloudflared Deployment are now managed by ArgoCD (GitOps). Do NOT add them here.

- name: Management Hub — Drift Correction
  hosts: management-hub
  gather_facts: true

  pre_tasks:
    - name: Gather minimal facts
      ansible.builtin.setup:
        gather_subset: [min]

  roles:
    - role: 1password-connect
      tags: [1password-connect]

    - role: argocd
      tags: [argocd]
