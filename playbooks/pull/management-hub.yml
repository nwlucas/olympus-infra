---
# Pull-mode playbook for management-hub
# Runs daily at 02:00 via crontab as the ansible user.
# Re-applies all idempotent foundation roles to correct drift.
# IngressRoutes, cloudflared config, and Helm state are all reconciled here.

- name: Management Hub — Drift Correction
  hosts: management-hub
  gather_facts: true

  pre_tasks:
    - name: Gather minimal facts
      ansible.builtin.setup:
        gather_subset: [min]

  roles:
    - role: traefik
      tags: [traefik]

    - role: 1password-connect
      tags: [1password-connect]

    - role: external-secrets
      tags: [external-secrets]

    - role: argocd
      tags: [argocd]

    - role: cloudflared-k8s
      tags: [cloudflared-k8s]
