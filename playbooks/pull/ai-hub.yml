---
# Pull-mode playbook for AI Hub
# Runs daily at 02:00 via LaunchDaemon as the ansible user.
# Maintains: OrbStack k8s, cloudflared tunnel, ESO bootstrap secret, native services.
# ArgoCD handles app deployments — this only manages the platform layer.

- name: AI Hub — Drift Correction
  hosts: ai_hub
  gather_facts: true

  roles:
    # Keep OrbStack k8s running
    - role: orbstack
      tags: [orbstack]

    # Keep ESO bootstrap secret present
    - role: eso-bootstrap
      tags: [eso-bootstrap]

    # Keep cloudflared tunnel deployed and routes configured
    - role: cloudflared-k8s
      tags: [cloudflared-k8s]

  tasks:
    - name: Check Ollama is responding
      ansible.builtin.uri:
        url: "http://localhost:{{ ollama_service_port | default(11434) }}/api/tags"
        method: GET
      register: ollama_check
      failed_when: false
      changed_when: false

    - name: Report Ollama status
      ansible.builtin.debug:
        msg: "Ollama HTTP status: {{ ollama_check.status | default('unreachable') }}"

    - name: Check LiteLLM is responding
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port | default(4000) }}/health"
        method: GET
      register: litellm_check
      failed_when: false
      changed_when: false

    - name: Report LiteLLM status
      ansible.builtin.debug:
        msg: "LiteLLM HTTP status: {{ litellm_check.status | default('unreachable') }}"

    - name: Check Tailscale status
      ansible.builtin.command: /opt/homebrew/bin/tailscale status --json
      register: ts_status
      failed_when: false
      changed_when: false

    - name: Report Tailscale status
      ansible.builtin.debug:
        msg: >
          Tailscale BackendState:
          {{ (ts_status.stdout | from_json).BackendState | default('unknown') }}
      when: ts_status.rc == 0
