---
# Pull-mode playbook for compute-hub nodes (onode-030c31, onode-0312ce, onode-0314ac)
# Runs via crontab as the ansible user after the one-time SSH bootstrap.
# Each node runs: ansible-pull -U <repo> -i inventory/compute-hub.yml
#   playbooks/pull/compute-hub.yml --limit $(hostname -s)
#
# Secrets are fetched from 1Password at runtime using the service account token
# stored at /opt/ansible-pull/.op-service-account-token on each node.
# The service account must have read/write access to the Dev vault.
#
# PRE-FLIGHT (manual, before running):
#   - 1Password Dev vault items: compute-hub-k3s-token, tailscale-oauth,
#     flux-github-token, 1password-connect-token, cloudflare-api-token,
#     cloudflare-account-id
#   - OP service account token: expanded scope to Dev vault (read + write)
#   - Static DNS A record: compute-hub.nwlnexus.net → 192.168.253.10

- name: Compute Hub — Full Bootstrap & Drift Correction
  hosts: compute_hub
  gather_facts: true

  pre_tasks:
    - name: Gather facts (min + network — needed for kube-vip interface detection)
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - min
          - network

    # ── Read OP service account token from file written by cloud-init ──────────
    - name: Read OP service account token
      ansible.builtin.slurp:
        src: /opt/ansible-pull/.op-service-account-token
      register: _op_sat_b64
      become: true
      no_log: true

    - name: Set OP environment fact
      ansible.builtin.set_fact:
        _op_env:
          OP_SERVICE_ACCOUNT_TOKEN: "{{ _op_sat_b64.content | b64decode | trim }}"
      no_log: true

    # ── Fetch all secrets from 1Password ─────────────────────────────────────
    # Each node reads secrets for its own role set.
    # References must match items in the Dev vault.
    - name: Fetch secrets from 1Password
      ansible.builtin.command: "op read '{{ item.ref }}'"
      environment: "{{ _op_env }}"
      register: _op_secrets
      loop:
        - { name: tailscale_oauth_client_id,     ref: "op://Dev/tailscale-oauth/client_id" }
        - { name: tailscale_oauth_client_secret,  ref: "op://Dev/tailscale-oauth/client_secret" }
        - { name: ddclient_cf_api_token,          ref: "op://Dev/cloudflare-api-token/credential" }
        - { name: cloudflared_api_token,          ref: "op://Dev/cloudflare-api-token/credential" }
        - { name: cloudflared_account_id,         ref: "op://Dev/cloudflare-account-id/credential" }
        - { name: flux_github_token,              ref: "op://Dev/flux-github-token/credential" }
        - { name: eso_connect_token,              ref: "op://Dev/1password-connect-token/credential" }
      no_log: true
      changed_when: false

    - name: Set secret facts from 1Password results
      ansible.builtin.set_fact:
        "{{ item.item.name }}": "{{ item.stdout | trim }}"
      loop: "{{ _op_secrets.results }}"
      no_log: true

    # ── Disable cloud-init ansible-pull systemd timer (replaced by cron) ──────
    # The cloud-init ISO installs a systemd timer using the GitHub App wrapper.
    # The ansible-pull role below installs a simpler public-repo cron instead.
    - name: Stop and disable cloud-init ansible-pull systemd timer
      ansible.builtin.systemd:
        name: ansible-pull.timer
        state: stopped
        enabled: false
      become: true
      failed_when: false   # timer may not exist on repeat runs

    - name: Stop cloud-init ansible-pull service
      ansible.builtin.systemd:
        name: ansible-pull.service
        state: stopped
      become: true
      failed_when: false

  roles:
    # ── Foundation (all nodes) ────────────────────────────────────────────────
    - role: node-prereqs
      tags: [node-prereqs]

    - role: tailscale
      tags: [tailscale]

    - role: ddclient
      tags: [ddclient]

    # ── k3s HA cluster ────────────────────────────────────────────────────────
    # Primary runs --cluster-init and deploys kube-vip, then exports kubeconfig.
    # Secondaries wait for the VIP then join. Both paths are in the k3s role
    # and gated on k3s_primary / k3s_init / k3s_ha vars.
    - role: k3s
      tags: [k3s]

    # ── Primary-only: GitOps bootstrap ───────────────────────────────────────
    - role: eso-bootstrap
      tags: [eso-bootstrap]
      when: k3s_primary | default(false)

    - role: cloudflared-k8s
      tags: [cloudflared-k8s]
      when: k3s_primary | default(false)

    - role: flux
      tags: [flux]
      when: k3s_primary | default(false)

    # ── ansible-pull cron (all nodes, runs last) ──────────────────────────────
    # Installs the crontab entry that makes this playbook self-sustaining.
    # Replaces the cloud-init systemd timer (disabled in pre_tasks above).
    - role: ansible-pull
      tags: [ansible-pull]
