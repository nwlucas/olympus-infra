---
- name: Install OrbStack via Homebrew
  community.general.homebrew:
    name: orbstack
    state: "{{ 'present' if orbstack_state == 'present' else 'absent' }}"
  become: false
  when: orbstack_state == 'present'

# OrbStack auto-starts services when any CLI command is issued (headless mode).
# Ensure orb binary is on PATH for non-interactive Ansible sessions.
- name: Ensure OrbStack CLI is on PATH (non-interactive shell)
  ansible.builtin.lineinfile:
    path: "~/.zprofile"
    line: 'export PATH="$PATH:/Applications/OrbStack.app/Contents/MacOS"'
    create: true
    mode: '0644'
  become: false
  when: orbstack_state == 'present'

- name: Check if OrbStack Kubernetes context already exists
  ansible.builtin.command: /Applications/OrbStack.app/Contents/MacOS/orbctl get k8s
  register: _orb_k8s_ctx
  failed_when: false
  changed_when: false
  become: false
  when: orbstack_state == 'present'

- name: Start OrbStack Kubernetes (auto-starts OrbStack daemon if not running)
  ansible.builtin.command: /Applications/OrbStack.app/Contents/MacOS/orbctl start k8s
  register: _orb_k8s_start
  changed_when: true
  failed_when: false
  become: false
  when:
    - orbstack_state == 'present'
    - _orb_k8s_ctx.rc != 0

- name: Wait for OrbStack k8s API to be ready
  ansible.builtin.command: >
    /Applications/OrbStack.app/Contents/MacOS/orbctl kubectl
    --context {{ orbstack_k8s_context }} get nodes
  register: _orb_k8s_ready
  until: _orb_k8s_ready.rc == 0
  retries: 36
  delay: 5
  changed_when: false
  become: false
  when: orbstack_state == 'present'

- name: Remove OrbStack
  community.general.homebrew:
    name: orbstack
    state: absent
  become: false
  when: orbstack_state == 'absent'
