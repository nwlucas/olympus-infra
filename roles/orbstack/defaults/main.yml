---
orbstack_state: present
orbstack_k8s_context: orbstack
orbstack_kubeconfig_path: "~/.kube/config"
# Timeout in seconds waiting for k8s to be ready
orbstack_k8s_timeout: 180
# k8s API proxy: forwards 0.0.0.0:proxy_port → 127.0.0.1:local_port
# Allows ArgoCD on management-hub to reach this cluster over Tailscale
orbstack_k8s_api_proxy_state: absent    # set to 'present' in host_vars to enable
orbstack_k8s_api_proxy_port: 6443       # port to listen on (all interfaces)
orbstack_k8s_api_local_port: 26443      # OrbStack k8s API local port

# Helm chart CRDs to pre-install into the OrbStack k8s cluster.
# kustomize helmCharts (and `helm template`) skip a chart's crds/ directory,
# so any chart that ships CRDs there must be listed here to avoid ArgoCD
# sync failures and dependent controllers (e.g. external-dns) crashing.
orbstack_helm_crds:
  - repo_name: traefik
    repo_url: https://traefik.github.io/charts
    chart: traefik/traefik
    version: "39.0.7"
