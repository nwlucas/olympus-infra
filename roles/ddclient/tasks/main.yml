---
- name: Set ddclient state
  ansible.builtin.set_fact:
    _ddclient_state: "{{ ddclient_state | default('present') }}"

- name: Set platform-specific config path
  ansible.builtin.set_fact:
    _ddclient_conf_path: "{{ '/opt/homebrew/etc/ddclient.conf' if ansible_os_family == 'Darwin' else '/etc/ddclient.conf' }}"

# --- ABSENT ---
- name: Remove ddclient (Linux)
  ansible.builtin.apt:
    name: ddclient
    state: absent
    purge: true
  become: true
  when:
    - _ddclient_state == 'absent'
    - ansible_os_family != 'Darwin'

- name: Remove ddclient (macOS)
  community.general.homebrew:
    name: ddclient
    state: absent
  when:
    - _ddclient_state == 'absent'
    - ansible_os_family == 'Darwin'

- name: Remove ddclient config
  ansible.builtin.file:
    path: "{{ _ddclient_conf_path }}"
    state: absent
  become: "{{ ansible_os_family != 'Darwin' }}"
  when: _ddclient_state == 'absent'

# --- PRESENT ---

# Resolve CF token: vault var takes precedence over op read (for push-mode compat)
- name: Use vault-provided Cloudflare token
  ansible.builtin.set_fact:
    _ddclient_cf_token: "{{ ddclient_cf_api_token }}"
  no_log: true
  when:
    - _ddclient_state == 'present'
    - ddclient_cf_api_token != ""

- name: Read Cloudflare token from 1Password (pull-mode)
  ansible.builtin.shell: |
    set -o pipefail
    OP_SERVICE_ACCOUNT_TOKEN=$(cat /etc/olympus/op-service-account-token 2>/dev/null || echo "")
    if [ -n "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
      export OP_SERVICE_ACCOUNT_TOKEN
      /usr/local/bin/op read "{{ ddclient_cf_token_op_ref }}"
    else
      echo ""
    fi
  args:
    executable: /bin/bash
  register: _op_token_read
  no_log: true
  changed_when: false
  failed_when: false
  when:
    - _ddclient_state == 'present'
    - ddclient_cf_api_token == ""

- name: Set token fact from 1Password read
  ansible.builtin.set_fact:
    _ddclient_cf_token: "{{ _op_token_read.stdout | trim }}"
  no_log: true
  when:
    - _ddclient_state == 'present'
    - ddclient_cf_api_token == ""
    - _op_token_read.stdout | default('') | trim != ''

- name: Skip ddclient setup — no Cloudflare token available
  ansible.builtin.debug:
    msg: "ddclient skipped: no CF token (set ddclient_cf_api_token or configure op service account)"
  when:
    - _ddclient_state == 'present'
    - _ddclient_cf_token | default('') == ''

- name: End play for this host if no token
  ansible.builtin.meta: end_host
  when:
    - _ddclient_state == 'present'
    - _ddclient_cf_token | default('') == ''

- name: Gather network facts
  ansible.builtin.setup:
    gather_subset: [network]
  when: _ddclient_state == 'present'

- name: Install ddclient (Linux)
  ansible.builtin.apt:
    name: ddclient
    state: present
    update_cache: true
  become: true
  when:
    - _ddclient_state == 'present'
    - ansible_os_family != 'Darwin'

- name: Install ddclient (macOS)
  community.general.homebrew:
    name: ddclient
    state: present
  when:
    - _ddclient_state == 'present'
    - ansible_os_family == 'Darwin'

# Look up zone ID once for all record operations
- name: Look up Cloudflare zone ID
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones?name={{ ddclient_zone }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _ddclient_cf_token }}"
    status_code: 200
  register: _ddclient_zone_resp
  no_log: true
  when: _ddclient_state == 'present'

- name: Set zone ID fact
  ansible.builtin.set_fact:
    _ddclient_zone_id: "{{ _ddclient_zone_resp.json.result[0].id }}"
  when:
    - _ddclient_state == 'present'
    - (_ddclient_zone_resp.json.result | default([]) | length) > 0

# Build the full list of internal FQDNs to seed
- name: Build internal FQDN list
  ansible.builtin.set_fact:
    _ddclient_internal_fqdns: >-
      {{ [ansible_hostname + '.' + ddclient_zone] + (ddclient_extra_fqdns | list) }}
  when: _ddclient_state == 'present'

# --- Seed A records (idempotent: create if absent, skip if present) ---

- name: Check existing public A record
  ansible.builtin.uri:
    url: >-
      https://api.cloudflare.com/client/v4/zones/{{ _ddclient_zone_id
      }}/dns_records?type=A&name={{ ansible_hostname
      }}.{{ ddclient_subdomain }}.{{ ddclient_zone }}
    method: GET
    headers:
      Authorization: "Bearer {{ _ddclient_cf_token }}"
    status_code: 200
  register: _ddclient_public_check
  no_log: true
  when: _ddclient_state == 'present'

- name: Create public A record
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ _ddclient_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ _ddclient_cf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: A
      name: "{{ ansible_hostname }}.{{ ddclient_subdomain }}.{{ ddclient_zone }}"
      content: "{{ ansible_default_ipv4.address }}"
      ttl: "{{ ddclient_ttl }}"
      proxied: false
    status_code: 200
  no_log: true
  when:
    - _ddclient_state == 'present'
    - (_ddclient_public_check.json.result | default([]) | length) == 0

- name: Check existing internal A records
  ansible.builtin.uri:
    url: >-
      https://api.cloudflare.com/client/v4/zones/{{ _ddclient_zone_id }}/dns_records?type=A&name={{ item }}
    method: GET
    headers:
      Authorization: "Bearer {{ _ddclient_cf_token }}"
    status_code: 200
  register: _ddclient_internal_checks
  no_log: true
  loop: "{{ _ddclient_internal_fqdns }}"
  when: _ddclient_state == 'present'

- name: Create missing internal A records
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ _ddclient_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ _ddclient_cf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: A
      name: "{{ item.item }}"
      content: "{{ ansible_default_ipv4.address }}"
      ttl: "{{ ddclient_ttl }}"
      proxied: false
    status_code: 200
  no_log: true
  loop: "{{ _ddclient_internal_checks.results | default([]) }}"
  when:
    - _ddclient_state == 'present'
    - (item.json.result | default([]) | length) == 0

# --- ddclient config ---

- name: Render ddclient.conf (Linux)
  ansible.builtin.template:
    src: ddclient.conf.j2
    dest: "{{ _ddclient_conf_path }}"
    owner: root
    group: root
    mode: '0600'
  become: true
  notify: restart ddclient
  when:
    - _ddclient_state == 'present'
    - ansible_os_family != 'Darwin'

- name: Render ddclient.conf (macOS)
  ansible.builtin.template:
    src: ddclient.conf.j2
    dest: "{{ _ddclient_conf_path }}"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"
    mode: '0600'
  notify: restart ddclient
  when:
    - _ddclient_state == 'present'
    - ansible_os_family == 'Darwin'

- name: Enable and start ddclient (Linux)
  ansible.builtin.systemd:
    name: ddclient
    enabled: true
    state: started
  become: true
  when:
    - _ddclient_state == 'present'
    - ansible_os_family != 'Darwin'

- name: Enable and start ddclient (macOS)
  community.general.homebrew_service:
    name: ddclient
    state: started
  when:
    - _ddclient_state == 'present'
    - ansible_os_family == 'Darwin'
