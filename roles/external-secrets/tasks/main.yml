---
- name: Set external-secrets state
  ansible.builtin.set_fact:
    _external_secrets_state: "{{ external_secrets_state | default('present') }}"

# --- PRESENT ---

- name: Add external-secrets Helm repo
  ansible.builtin.command: helm repo add external-secrets https://charts.external-secrets.io
  register: repo_add
  changed_when: "'already exists' not in repo_add.stderr"
  become: true
  when: _external_secrets_state == 'present'

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  become: true
  changed_when: false
  when: _external_secrets_state == 'present'

- name: Create external-secrets namespace
  ansible.builtin.command: kubectl create namespace {{ external_secrets_namespace }}
  register: ns_create
  failed_when:
    - ns_create.rc != 0
    - "'already exists' not in ns_create.stderr"
  changed_when: ns_create.rc == 0
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  when: _external_secrets_state == 'present'

- name: Install external-secrets via Helm
  ansible.builtin.command: >
    helm upgrade --install external-secrets external-secrets/external-secrets
    --namespace {{ external_secrets_namespace }}
    --version {{ external_secrets_chart_version }}
    --wait
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  when: _external_secrets_state == 'present'

- name: Wait for external-secrets webhook rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/external-secrets-webhook
    -n {{ external_secrets_namespace }}
    --timeout=120s
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false
  when: _external_secrets_state == 'present'

- name: Create 1Password Connect token secret
  ansible.builtin.shell: >
    kubectl create secret generic onepassword-connect-token
    --namespace {{ external_secrets_namespace }}
    --from-literal=token={{ onepassword_connect_token }}
    --dry-run=client -o yaml | kubectl apply -f -
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when:
    - _external_secrets_state == 'present'
    - onepassword_connect_token != ""

- name: Render ClusterSecretStore manifest
  ansible.builtin.template:
    src: cluster-secret-store.yaml.j2
    dest: /tmp/external-secrets-cluster-secret-store.yaml
    mode: "0600"
  when:
    - _external_secrets_state == 'present'
    - onepassword_connect_token != ""

- name: Apply ClusterSecretStore manifest
  ansible.builtin.command: kubectl apply -f /tmp/external-secrets-cluster-secret-store.yaml
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  when:
    - _external_secrets_state == 'present'
    - onepassword_connect_token != ""

# --- ABSENT ---

- name: Uninstall external-secrets
  ansible.builtin.command: helm uninstall external-secrets -n {{ external_secrets_namespace }}
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  failed_when: false
  changed_when: true
  when: _external_secrets_state == 'absent'
