---
flux_state: present
flux_version: "2.4.0"
# GitHub repo details — nwlucas/olympus-gitops
flux_github_owner: "nwlucas"
flux_github_repo: "olympus-gitops"
flux_github_branch: "main"
# Set per-host in host_vars: clusters/management-hub or clusters/ai-hub
flux_cluster_path: ""
# GitHub PAT with repo scope — provided from 1Password via Ansible vault
# Only needed for the initial bootstrap. Flux creates a deploy key and uses that going forward.
flux_github_token: ""
# Kubeconfig path on the remote host
# For k3s (management-hub): /etc/rancher/k3s/k3s.yaml
# For OrbStack (ai-hub): use the home-directory kube config
flux_kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"
# Optional kubeconfig context name — leave empty for default context in the kubeconfig
flux_kubeconfig_context: ""

# --- KUBECONFIG EXPORT TO 1PASSWORD ---
# Reads kubeconfig from the remote host, patches the server URL, and uploads as a
# 1Password document. Mirrors what the argocd role does for management-hub.
# Set flux_kubeconfig_1password_item to enable; leave empty to skip.
flux_kubeconfig_1password_item: ""
flux_kubeconfig_1password_vault: "Dev"
# Patch internal server URL (127.0.0.1:*) to this host for remote kubectl access.
# If empty, Tailscale IPv4 is auto-resolved from `tailscale status --json`.
flux_kubeconfig_external_server: ""
# Port to use in the patched kubeconfig. 26443 = OrbStack native k8s API port.
flux_kubeconfig_external_port: 26443
# Second kubeconfig with Tailscale MagicDNS FQDN as the server.
# Set to a 1Password item name to enable; leave empty to skip.
flux_tailnet_kubeconfig_1password_item: ""
# Tailscale MagicDNS FQDN to use in the tailnet kubeconfig.
# If empty, auto-resolved from `tailscale status --json`.
flux_tailnet_server: ""

# --- HEADLAMP ADMIN TOKEN ---
# Generates a long-lived token for the Headlamp admin ServiceAccount and stores it
# in 1Password so users can authenticate after Cloudflare Access.
# Set flux_headlamp_token_1password_item to enable; leave empty to skip.
flux_headlamp_token_1password_item: ""
flux_headlamp_sa_name: "headlamp-admin"
flux_headlamp_sa_namespace: "headlamp"

# --- HEADLAMP COMBINED KUBECONFIG SECRET ---
# Creates a k8s Secret merging the local cluster kubeconfig (server patched to
# https://kubernetes.default.svc) with a secondary cluster kubeconfig from 1Password.
# Only set on the cluster that runs Headlamp (management-hub).
# Set flux_headlamp_combined_kubeconfig_secret to enable; leave empty to skip.
flux_headlamp_combined_kubeconfig_secret: ""
flux_headlamp_combined_kubeconfig_namespace: "headlamp"
# List of 1Password document names for secondary cluster kubeconfigs.
# Each entry is fetched and merged into the combined kubeconfig.
# Add new clusters here as they are bootstrapped — re-run the role to update the Secret.
# Example:
#   flux_headlamp_secondary_kubeconfig_1password_items:
#     - ai-hub-kubeconfig
#     - node-hub-kubeconfig
flux_headlamp_secondary_kubeconfig_1password_items: []
