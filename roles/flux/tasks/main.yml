---
# --- PRESENT ---

- name: Install flux CLI
  ansible.builtin.shell: |
    set -o pipefail
    curl -s https://fluxcd.io/install.sh | FLUX_VERSION={{ flux_version }} bash
  args:
    creates: /usr/local/bin/flux
    executable: /bin/bash
  become: true
  when: flux_state == 'present'

- name: Verify flux CLI version
  ansible.builtin.command: flux version --client
  register: _flux_cli_version
  changed_when: false
  failed_when: _flux_cli_version.rc != 0
  when: flux_state == 'present'

- name: Bootstrap Flux from olympus-gitops
  ansible.builtin.shell: |
    set -o pipefail
    flux bootstrap github \
      --owner={{ flux_github_owner }} \
      --repository={{ flux_github_repo }} \
      --branch={{ flux_github_branch }} \
      --path={{ flux_cluster_path }} \
      --personal \
      --token-auth \
      {% if flux_kubeconfig_context != '' %}--context={{ flux_kubeconfig_context }} \
      {% endif %}--kubeconfig={{ flux_kubeconfig_path }}
  args:
    executable: /bin/bash
  environment:
    GITHUB_TOKEN: "{{ flux_github_token }}"
  become: true
  register: _flux_bootstrap
  changed_when: "'no changes' not in (_flux_bootstrap.stdout | default(''))"
  failed_when: _flux_bootstrap.rc != 0
  when:
    - flux_state == 'present'
    - flux_cluster_path != ''
    - flux_github_token != ''

- name: Wait for Flux controllers to be ready
  ansible.builtin.command: >
    flux check --kubeconfig={{ flux_kubeconfig_path }}
    {% if flux_kubeconfig_context != '' %}--context={{ flux_kubeconfig_context }}{% endif %}
  become: true
  register: _flux_check
  until: _flux_check.rc == 0
  retries: 12
  delay: 10
  changed_when: false
  when:
    - flux_state == 'present'
    - flux_cluster_path != ''

# --- ABSENT ---

- name: Uninstall Flux
  ansible.builtin.shell: |
    set -o pipefail
    flux uninstall \
      --kubeconfig={{ flux_kubeconfig_path }} \
      {% if flux_kubeconfig_context != '' %}--context={{ flux_kubeconfig_context }} \
      {% endif %}--silent
  args:
    executable: /bin/bash
  become: true
  changed_when: true
  failed_when: false
  when: flux_state == 'absent'
