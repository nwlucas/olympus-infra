---
- name: Install Ollama via Homebrew
  community.general.homebrew:
    name: ollama
    state: "{{ 'present' if ollama_state == 'present' else 'absent' }}"

- name: Deploy Ollama wrapper script
  ansible.builtin.template:
    src: ollama-serve.j2
    dest: /usr/local/bin/ollama-serve
    owner: root
    group: wheel
    mode: "0755"
  become: true
  when: ollama_state == "present"

- name: Deploy Ollama LaunchDaemon plist
  ansible.builtin.template:
    src: ollama.plist.j2
    dest: /Library/LaunchDaemons/homebrew.mxcl.ollama.plist
    owner: root
    group: wheel
    mode: "0644"
  become: true
  when: ollama_state == "present"
  register: ollama_plist

- name: Bootout existing Ollama LaunchDaemon (if running)
  ansible.builtin.command: launchctl bootout system/homebrew.mxcl.ollama
  become: true
  failed_when: false
  changed_when: true
  when:
    - ollama_state == "present"
    - ollama_plist is changed

- name: Bootstrap Ollama LaunchDaemon
  ansible.builtin.command: launchctl bootstrap system /Library/LaunchDaemons/homebrew.mxcl.ollama.plist
  become: true
  changed_when: true
  when:
    - ollama_state == "present"
    - ollama_plist is changed

- name: Ensure Ollama LaunchDaemon is running (kickstart)
  ansible.builtin.command: launchctl kickstart system/homebrew.mxcl.ollama
  become: true
  failed_when: false
  changed_when: false
  when:
    - ollama_state == "present"
    - ollama_plist is not changed

- name: Remove Ollama LaunchDaemon
  ansible.builtin.command: launchctl bootout system /Library/LaunchDaemons/homebrew.mxcl.ollama.plist
  become: true
  failed_when: false
  changed_when: true
  when: ollama_state == "absent"

- name: Remove Ollama LaunchDaemon plist and wrapper
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - /Library/LaunchDaemons/homebrew.mxcl.ollama.plist
    - /usr/local/bin/ollama-serve
  when: ollama_state == "absent"

- name: Wait for Ollama to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ ollama_service_port }}/api/tags"
    method: GET
  register: ollama_ready
  until: ollama_ready.status == 200
  retries: 24
  delay: 5
  when: ollama_state == "present"

- name: Get list of already-pulled models
  ansible.builtin.uri:
    url: "http://localhost:{{ ollama_service_port }}/api/tags"
    method: GET
    return_content: true
  register: ollama_models_response
  when: ollama_state == "present"

- name: Set pulled model names
  ansible.builtin.set_fact:
    ollama_pulled_models: >-
      {{ ollama_models_response.json.models | map(attribute='name') | list }}
  when: ollama_state == "present"

- name: Pull Ollama models
  ansible.builtin.shell: |
    /opt/homebrew/bin/ollama pull {{ item }} \
      > ~/.ollama/pull-{{ item | replace(':', '-') | replace('/', '-') }}.log 2>&1
  loop: "{{ ollama_models }}"
  when:
    - ollama_state == "present"
    - item not in ollama_pulled_models
  changed_when: true
  timeout: 7200
