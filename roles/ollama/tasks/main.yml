---
- name: Install Ollama via Homebrew
  community.general.homebrew:
    name: ollama
    state: "{{ 'present' if ollama_state == 'present' else 'absent' }}"

- name: Stop and unload Ollama service
  ansible.builtin.command: /opt/homebrew/bin/brew services stop ollama
  become: true
  when: ollama_state == "absent"
  failed_when: false
  changed_when: true

- name: Start Ollama service (LaunchDaemon — survives reboot without GUI session)
  ansible.builtin.command: /opt/homebrew/bin/brew services start ollama
  become: true
  register: ollama_start
  changed_when: "'Successfully started' in ollama_start.stdout"
  failed_when: false
  when: ollama_state == "present"

- name: Wait for Ollama to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ ollama_service_port }}/api/tags"
    method: GET
  register: ollama_ready
  until: ollama_ready.status == 200
  retries: 24
  delay: 5
  when: ollama_state == "present"

- name: Get list of already-pulled models
  ansible.builtin.uri:
    url: "http://localhost:{{ ollama_service_port }}/api/tags"
    method: GET
    return_content: true
  register: ollama_models_response
  when: ollama_state == "present"

- name: Set pulled model names
  ansible.builtin.set_fact:
    ollama_pulled_models: >-
      {{ ollama_models_response.json.models | map(attribute='name') | list }}
  when: ollama_state == "present"

- name: Pull Ollama models
  ansible.builtin.shell: |
    /opt/homebrew/bin/ollama pull {{ item }} \
      > ~/.ollama/pull-{{ item | replace(':', '-') | replace('/', '-') }}.log 2>&1
  loop: "{{ ollama_models }}"
  when:
    - ollama_state == "present"
    - item not in ollama_pulled_models
  changed_when: true
  timeout: 7200
