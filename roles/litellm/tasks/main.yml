---
- name: Install pipx via Homebrew
  community.general.homebrew:
    name: pipx
    state: "{{ 'present' if litellm_state == 'present' else 'absent' }}"

- name: Install python@3.13 via Homebrew (LiteLLM dep — orjson/pyo3 doesn't support 3.14 yet)
  community.general.homebrew:
    name: python@3.13
    state: "{{ 'present' if litellm_state == 'present' else 'absent' }}"

- name: Check if LiteLLM proxy server module is importable
  # An existing 'pipx install litellm' (no extras) is missing websockets/uvicorn/fastapi
  # and crashes at startup. Detect that state explicitly.
  ansible.builtin.command: /opt/homebrew/bin/pipx runpip litellm show websockets
  register: _litellm_websockets_check
  changed_when: false
  failed_when: false
  when: litellm_state == "present"

- name: Uninstall existing LiteLLM venv (proxy deps missing — rebuild with python@3.13)
  ansible.builtin.command: /opt/homebrew/bin/pipx uninstall litellm
  register: _litellm_uninstall
  changed_when: _litellm_uninstall.rc == 0
  failed_when: false
  when:
    - litellm_state == "present"
    - _litellm_websockets_check.rc != 0

- name: Reinstall LiteLLM with [proxy] extras on python@3.13
  ansible.builtin.command: /opt/homebrew/bin/pipx install --python /opt/homebrew/opt/python@3.13/bin/python3.13 "litellm[proxy]"
  register: litellm_reinstall
  changed_when: "'installed package litellm' in (litellm_reinstall.stdout | default(''))"
  when:
    - litellm_state == "present"
    - _litellm_websockets_check.rc != 0

- name: Install LiteLLM via pipx with [proxy] extras (fresh install)
  ansible.builtin.command: /opt/homebrew/bin/pipx install --python /opt/homebrew/opt/python@3.13/bin/python3.13 "litellm[proxy]"
  register: litellm_install
  changed_when: "'installed package litellm' in (litellm_install.stdout | default(''))"
  failed_when:
    - litellm_install.rc != 0
    - "'already installed' not in (litellm_install.stdout | default(''))"
  when:
    - litellm_state == "present"
    - _litellm_websockets_check.rc == 0

- name: Uninstall LiteLLM via pipx
  ansible.builtin.command: /opt/homebrew/bin/pipx uninstall litellm
  register: litellm_uninstall
  changed_when: litellm_uninstall.rc == 0
  failed_when: false
  when: litellm_state == "absent"

- name: Fetch LiteLLM Anthropic API key from 1Password Connect
  ansible.builtin.command: /opt/homebrew/bin/op read "op://Dev/litellm/anthropic-api-key"
  register: _litellm_anthropic_api_key
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: litellm_state == "present"

- name: Fetch LiteLLM master key from 1Password Connect
  ansible.builtin.command: /opt/homebrew/bin/op read "op://Dev/litellm/master-key"
  register: _litellm_master_key
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: litellm_state == "present"

- name: Set LiteLLM key facts
  ansible.builtin.set_fact:
    litellm_anthropic_api_key: "{{ _litellm_anthropic_api_key.stdout | trim }}"
    litellm_master_key: "{{ _litellm_master_key.stdout | trim }}"
  no_log: true
  when: litellm_state == "present"

- name: Ensure LiteLLM config directory exists
  ansible.builtin.file:
    path: "{{ litellm_config_dest | dirname }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
  become: true
  when: litellm_state == "present"

- name: Deploy LiteLLM config
  ansible.builtin.template:
    src: litellm-config.yaml.j2
    dest: "{{ litellm_config_dest }}"
    owner: "{{ ansible_user }}"
    mode: "0640"
  become: true
  notify: Restart LiteLLM
  when: litellm_state == "present"

- name: Deploy LiteLLM wrapper script
  ansible.builtin.template:
    src: litellm-serve.j2
    dest: /usr/local/bin/litellm-serve
    owner: root
    group: wheel
    mode: "0755"
  become: true
  when: litellm_state == "present"

- name: Deploy LiteLLM LaunchDaemon plist
  ansible.builtin.template:
    src: litellm.plist.j2
    dest: /Library/LaunchDaemons/com.litellm.proxy.plist
    owner: root
    group: wheel
    mode: "0644"
  become: true
  notify: Restart LiteLLM
  when: litellm_state == "present"
  register: litellm_plist

- name: Bootout existing LiteLLM LaunchDaemon (if running)
  ansible.builtin.command: launchctl bootout system/com.litellm.proxy
  become: true
  failed_when: false
  changed_when: true
  when:
    - litellm_state == "present"
    - litellm_plist is changed

- name: Bootstrap LiteLLM LaunchDaemon
  ansible.builtin.command: launchctl bootstrap system /Library/LaunchDaemons/com.litellm.proxy.plist
  become: true
  changed_when: true
  when:
    - litellm_state == "present"
    - litellm_plist is changed

- name: Ensure LiteLLM LaunchDaemon is running (kickstart)
  ansible.builtin.command: launchctl kickstart system/com.litellm.proxy
  become: true
  failed_when: false
  changed_when: false
  when:
    - litellm_state == "present"
    - litellm_plist is not changed

- name: Unload and remove LiteLLM LaunchDaemon
  ansible.builtin.command: launchctl bootout system /Library/LaunchDaemons/com.litellm.proxy.plist
  become: true
  failed_when: false
  changed_when: true
  when: litellm_state == "absent"

- name: Remove LiteLLM plist, wrapper, and config
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - /Library/LaunchDaemons/com.litellm.proxy.plist
    - /usr/local/bin/litellm-serve
    - "{{ litellm_config_dest | dirname }}"
  when: litellm_state == "absent"
