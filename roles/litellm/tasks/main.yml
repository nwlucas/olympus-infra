---
- name: Install pipx via Homebrew
  community.general.homebrew:
    name: pipx
    state: "{{ 'present' if litellm_state == 'present' else 'absent' }}"

- name: Install LiteLLM via pipx
  ansible.builtin.command: /opt/homebrew/bin/pipx install litellm
  register: litellm_install
  changed_when: "'installed package litellm' in litellm_install.stdout"
  failed_when:
    - litellm_install.rc != 0
    - "'already installed' not in litellm_install.stdout"
  when: litellm_state == "present"

- name: Uninstall LiteLLM via pipx
  ansible.builtin.command: /opt/homebrew/bin/pipx uninstall litellm
  register: litellm_uninstall
  changed_when: litellm_uninstall.rc == 0
  failed_when: false
  when: litellm_state == "absent"

- name: Ensure LiteLLM config directory exists
  ansible.builtin.file:
    path: "{{ litellm_config_dest | dirname }}"
    state: directory
    mode: "0750"
    owner: "{{ ansible_user }}"
  when: litellm_state == "present"

- name: Install LiteLLM launchd plist
  ansible.builtin.template:
    src: litellm.plist.j2
    dest: /Library/LaunchDaemons/com.litellm.proxy.plist
    owner: root
    group: wheel
    mode: "0644"
  become: true
  notify: Restart LiteLLM
  when: litellm_state == "present"

- name: Load LiteLLM launchd daemon
  ansible.builtin.command: launchctl load -w /Library/LaunchDaemons/com.litellm.proxy.plist
  become: true
  changed_when: true
  failed_when: false
  when: litellm_state == "present"

- name: Unload and remove LiteLLM launchd daemon
  ansible.builtin.command: launchctl unload -w /Library/LaunchDaemons/com.litellm.proxy.plist
  become: true
  failed_when: false
  changed_when: true
  when: litellm_state == "absent"

- name: Remove LiteLLM launchd plist
  ansible.builtin.file:
    path: /Library/LaunchDaemons/com.litellm.proxy.plist
    state: absent
  become: true
  when: litellm_state == "absent"
