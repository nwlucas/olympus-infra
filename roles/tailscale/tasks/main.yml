---
# macOS only — Linux path handled separately (systemd/apt)
- name: Install Tailscale via Homebrew (macOS)
  community.general.homebrew:
    name: tailscale
    state: "{{ 'present' if tailscale_state == 'present' else 'absent' }}"
  when: ansible_os_family == "Darwin"

- name: Remove Tailscale (macOS)
  ansible.builtin.command: /opt/homebrew/bin/brew services stop tailscale
  when:
    - tailscale_state == "absent"
    - ansible_os_family == "Darwin"
  failed_when: false
  changed_when: true

- name: Check Tailscale status
  ansible.builtin.command: /opt/homebrew/bin/tailscale status --json
  register: tailscale_status
  failed_when: false
  changed_when: false
  when: tailscale_state == "present"

- name: Start Tailscale daemon (macOS)
  ansible.builtin.command: /opt/homebrew/bin/brew services start tailscale
  when:
    - tailscale_state == "present"
    - ansible_os_family == "Darwin"
    - tailscale_status.rc != 0
  changed_when: true

# OAuth flow handled in Task 5 (tailscale role rewrite)
# Placeholder: join using pre-generated auth key if oauth vars not set
- name: Join Tailscale network (auth key fallback)
  ansible.builtin.command: >
    /opt/homebrew/bin/tailscale up
    --hostname={{ tailscale_hostname }}
    --accept-routes={{ tailscale_accept_routes | lower }}
  when:
    - tailscale_state == "present"
    - tailscale_oauth_client_id == ""
    - tailscale_status is defined
    - tailscale_status.rc != 0 or (tailscale_status.stdout | from_json).BackendState != "Running"
  no_log: true
  changed_when: true
