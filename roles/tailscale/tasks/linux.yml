---
- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when: tailscale_state == 'present'

- name: Download Tailscale apt signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
    dest: /etc/apt/keyrings/tailscale.gpg
    mode: "0644"
  become: true
  when: tailscale_state == 'present'

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
    state: "{{ 'present' if tailscale_state == 'present' else 'absent' }}"
    filename: tailscale
  become: true

- name: Remove Tailscale apt signing key
  ansible.builtin.file:
    path: /etc/apt/keyrings/tailscale.gpg
    state: absent
  become: true
  when: tailscale_state == 'absent'

- name: Install Tailscale (Linux)
  ansible.builtin.apt:
    name: tailscale
    state: "{{ 'present' if tailscale_state == 'present' else 'absent' }}"
    update_cache: true
  become: true

- name: Enable and start tailscaled (Linux)
  ansible.builtin.systemd:
    name: tailscaled
    enabled: "{{ tailscale_state == 'present' }}"
    state: "{{ 'started' if tailscale_state == 'present' else 'stopped' }}"
  become: true

- name: Check Tailscale backend state
  ansible.builtin.command: tailscale status --json
  register: ts_status
  failed_when: false
  changed_when: false
  check_mode: false
  when: tailscale_state == "present"

- name: Set tailscale_is_running fact
  ansible.builtin.set_fact:
    tailscale_is_running: >-
      {{ (ts_status.stdout | from_json).BackendState == "Running"
         if (ts_status.rc is defined and ts_status.rc == 0 and ts_status.stdout | length > 0)
         else false }}
  when: tailscale_state == "present"

# ── Initial join (not yet connected) ──────────────────────────────────────

- name: Generate Tailscale OAuth access token
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ tailscale_oauth_client_id }}"
      client_secret: "{{ tailscale_oauth_client_secret }}"
    status_code: 200
  register: ts_oauth_token
  no_log: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""

- name: Create ephemeral auth key via Tailscale API
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/tailnet/-/keys
    method: POST
    headers:
      Authorization: "Bearer {{ ts_oauth_token.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      capabilities:
        devices:
          create:
            reusable: false
            ephemeral: true
            preauthorized: true
            tags: "{{ tailscale_tags }}"
      expirySeconds: 300
    status_code: 200
  register: ts_auth_key
  no_log: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - tailscale_oauth_client_id != ""
    - ts_oauth_token is defined and ts_oauth_token.status == 200

- name: Join Tailscale network with ephemeral key
  ansible.builtin.command: >
    tailscale up
    --authkey={{ ts_auth_key.json.key }}
    --hostname={{ tailscale_hostname }}
    --accept-routes={{ tailscale_accept_routes | lower }}
    {% if tailscale_advertise_exit_node %}--advertise-exit-node{% endif %}
    {% if tailscale_advertise_routes | default([]) | length > 0 %}--advertise-routes={{ tailscale_advertise_routes | join(',') }}{% endif %}
    {% if 'ssh' in (tailscale_services | default([])) %}--ssh{% endif %}
  become: true
  no_log: true
  changed_when: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - ts_auth_key is defined and ts_auth_key.status == 200

# ── Enforce desired settings on already-connected node ────────────────────
# tailscale set is idempotent — safe to run every time; applies only what changed.

- name: Apply Tailscale settings (already connected)
  ansible.builtin.command: >
    tailscale set
    --accept-routes={{ tailscale_accept_routes | lower }}
    --advertise-exit-node={{ tailscale_advertise_exit_node | lower }}
    {% if tailscale_advertise_routes | default([]) | length > 0 %}--advertise-routes={{ tailscale_advertise_routes | join(',') }}{% endif %}
    {% if 'ssh' in (tailscale_services | default([])) %}--ssh=true --accept-risk=lose-ssh{% else %}--ssh=false{% endif %}
  become: true
  changed_when: false
  # When enabling Tailscale SSH over a Tailscale-routed connection the SSH session
  # is rerouted immediately and the connection drops — this is expected and the
  # command has already succeeded. Suppress both the error and unreachable state.
  ignore_errors: true
  ignore_unreachable: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running

- name: Tailscale already connected — skip join
  ansible.builtin.debug:
    msg: "Tailscale already running on {{ tailscale_hostname }}, settings applied."
  when:
    - tailscale_state == "present"
    - tailscale_is_running

- name: Tailscale disconnect (absent)
  ansible.builtin.command: tailscale down
  become: true
  failed_when: false
  changed_when: true
  when: tailscale_state == "absent"
