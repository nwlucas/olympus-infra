---
- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when: tailscale_state == 'present'

- name: Download Tailscale apt signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
    dest: /etc/apt/keyrings/tailscale.gpg
    mode: "0644"
  become: true
  when: tailscale_state == 'present'

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
    state: "{{ 'present' if tailscale_state == 'present' else 'absent' }}"
    filename: tailscale
  become: true

- name: Remove Tailscale apt signing key
  ansible.builtin.file:
    path: /etc/apt/keyrings/tailscale.gpg
    state: absent
  become: true
  when: tailscale_state == 'absent'

- name: Install Tailscale (Linux)
  ansible.builtin.apt:
    name: tailscale
    state: "{{ 'present' if tailscale_state == 'present' else 'absent' }}"
    update_cache: true
  become: true

- name: Enable and start tailscaled (Linux)
  ansible.builtin.systemd:
    name: tailscaled
    enabled: "{{ tailscale_state == 'present' }}"
    state: "{{ 'started' if tailscale_state == 'present' else 'stopped' }}"
  become: true

# ── IP forwarding (required for subnet routing and exit node) ─────────────────
# Must be applied before `tailscale up` so the kernel can forward packets as
# soon as routes are advertised. Uses a dedicated sysctl drop-in so it
# survives upgrades and doesn't touch /etc/sysctl.conf.

- name: Enable IP forwarding for subnet routing / exit node (Linux)
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  become: true
  when:
    - tailscale_state == "present"
    - (tailscale_advertise_routes | default([]) | length > 0) or (tailscale_advertise_exit_node | default(false))

- name: Check Tailscale backend state
  ansible.builtin.command: tailscale status --json
  register: ts_status
  failed_when: false
  changed_when: false
  check_mode: false
  when: tailscale_state == "present"

- name: Set tailscale_is_running fact
  ansible.builtin.set_fact:
    tailscale_is_running: >-
      {{ (ts_status.stdout | from_json).BackendState == "Running"
         if (ts_status.rc is defined and ts_status.rc == 0 and ts_status.stdout | length > 0)
         else false }}
  when: tailscale_state == "present"

# Build optional flag lists once — used by both join and set commands.
# Each produces an empty list when the variable is empty/undefined, so no
# flag is appended and the command stays clean regardless of input.
- name: Build optional Tailscale flag lists
  ansible.builtin.set_fact:
    _ts_tags_argv: >-
      {{ ['--advertise-tags=' + (tailscale_tags | join(','))]
         if (tailscale_tags | default([]) | length > 0) else [] }}
    _ts_routes_argv: >-
      {{ ['--advertise-routes=' + (tailscale_advertise_routes | join(','))]
         if (tailscale_advertise_routes | default([]) | length > 0) else [] }}
  when: tailscale_state == "present"

# ── Initial join (not yet connected) ──────────────────────────────────────────

- name: Generate Tailscale OAuth access token
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ tailscale_oauth_client_id }}"
      client_secret: "{{ tailscale_oauth_client_secret }}"
    status_code: 200
  register: ts_oauth_token
  no_log: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""

# ephemeral: false — node persists in the tailnet when offline so it keeps
# the same Tailscale IP across reboots and re-auths. Ephemeral nodes are
# removed on disconnect which causes IP churn and disrupts DNS / k8s APIserver
# SANs that encode the Tailscale IP.
- name: Create auth key via Tailscale API
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/tailnet/-/keys
    method: POST
    headers:
      Authorization: "Bearer {{ ts_oauth_token.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      capabilities:
        devices:
          create:
            reusable: false
            ephemeral: "{{ tailscale_ephemeral }}"
            preauthorized: true
            tags: "{{ tailscale_tags }}"
      expirySeconds: 300
    status_code: 200
  register: ts_auth_key
  no_log: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - tailscale_oauth_client_id != ""
    - ts_oauth_token is defined and ts_oauth_token is not skipped

- name: Join Tailscale network
  ansible.builtin.command:
    argv: >-
      {{ ['tailscale', 'up',
          '--authkey=' + ts_auth_key.json.key,
          '--hostname=' + tailscale_hostname,
          '--accept-routes=' + (tailscale_accept_routes | lower),
          '--accept-dns=' + (tailscale_accept_dns | default(true) | lower)]
         + _ts_tags_argv
         + (['--advertise-exit-node'] if tailscale_advertise_exit_node else [])
         + _ts_routes_argv
         + (['--ssh'] if 'ssh' in (tailscale_services | default([])) else []) }}
  become: true
  no_log: true
  changed_when: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - ts_auth_key is defined and ts_auth_key is not skipped

# ── Enforce desired settings on already-connected node ────────────────────────
# tailscale set is idempotent — safe to run every time; applies only what changed.

- name: Apply Tailscale settings (already connected)
  ansible.builtin.command:
    argv: >-
      {{ ['tailscale', 'set',
          '--accept-routes=' + (tailscale_accept_routes | lower),
          '--advertise-exit-node=' + (tailscale_advertise_exit_node | lower),
          '--accept-dns=' + (tailscale_accept_dns | default(true) | lower)]
         + _ts_routes_argv
         + (['--ssh=true', '--accept-risk=lose-ssh']
            if 'ssh' in (tailscale_services | default([])) else ['--ssh=false']) }}
  become: true
  changed_when: false
  # When enabling Tailscale SSH over a Tailscale-routed connection the SSH session
  # is rerouted immediately and the connection drops — this is expected and the
  # command has already succeeded. Suppress both the error and unreachable state.
  ignore_errors: true
  ignore_unreachable: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running

# tailscale set does not support --hostname. Detect drift and fix via
# `tailscale up --hostname=...` which applies the change without re-joining.
- name: Detect Tailscale hostname drift
  ansible.builtin.set_fact:
    ts_hostname_current: "{{ (ts_status.stdout | from_json).Self.HostName }}"
    ts_device_id: "{{ (ts_status.stdout | from_json).Self.ID }}"
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_status.rc == 0

# `tailscale up` without an authkey updates settings on an already-connected
# node but requires ALL non-default flags to be re-stated (Tailscale enforces
# this to prevent accidental flag omissions). Mirror the full join argv minus
# the authkey so the command is self-consistent.
- name: Fix Tailscale hostname if drifted
  ansible.builtin.command:
    argv: >-
      {{ ['tailscale', 'up',
          '--hostname=' + tailscale_hostname,
          '--accept-routes=' + (tailscale_accept_routes | lower),
          '--accept-dns=' + (tailscale_accept_dns | default(true) | lower)]
         + _ts_tags_argv
         + (['--advertise-exit-node'] if tailscale_advertise_exit_node else [])
         + _ts_routes_argv
         + (['--ssh'] if 'ssh' in (tailscale_services | default([])) else []) }}
  become: true
  changed_when: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_hostname_current is defined
    - ts_hostname_current != tailscale_hostname

# tailscale set does not support --advertise-tags. Use the Tailscale API to
# update ACL tags in-place — no re-auth, no IP change, no service interruption.
# Requires OAuth client to have devices:write scope (Settings → Trust credentials).
- name: Check if ACL tags need updating
  ansible.builtin.set_fact:
    ts_tags_current: "{{ (ts_status.stdout | from_json).Self.Tags | default([]) | sort }}"
    ts_tags_desired: "{{ tailscale_tags | default([]) | sort }}"
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_status.rc == 0

- name: Get OAuth token for device updates
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ tailscale_oauth_client_id }}"
      client_secret: "{{ tailscale_oauth_client_secret }}"
    status_code: 200
  register: ts_oauth_device
  no_log: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""
    - (ts_tags_current != ts_tags_desired) or
      (ts_hostname_current is defined and ts_hostname_current != tailscale_hostname)

# Check via Tailscale API whether the node is ephemeral so we can re-auth to
# make it persistent. A node joined with an ephemeral key is removed from the
# tailnet when it goes offline — this causes IP churn on reboots.
- name: Query device info to detect ephemeral status
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/device/{{ ts_device_id }}"
    headers:
      Authorization: "Bearer {{ ts_oauth_device.json.access_token }}"
    status_code: 200
  register: ts_device_info
  no_log: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_device_id is defined
    - ts_oauth_device is defined and ts_oauth_device is not skipped

# Only re-auth when the node is currently ephemeral but desired state is persistent.
# (Ephemeral → ephemeral and persistent → persistent are both no-ops here.)
- name: Generate OAuth token for re-auth (ephemeral → persistent)
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ tailscale_oauth_client_id }}"
      client_secret: "{{ tailscale_oauth_client_secret }}"
    status_code: 200
  register: ts_oauth_reauth
  no_log: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - not tailscale_ephemeral
    - ts_device_info is defined and ts_device_info is not skipped
    - ts_device_info.json.isEphemeral | default(false)
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""

- name: Create persistent auth key for re-auth
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/tailnet/-/keys
    method: POST
    headers:
      Authorization: "Bearer {{ ts_oauth_reauth.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      capabilities:
        devices:
          create:
            reusable: false
            ephemeral: "{{ tailscale_ephemeral }}"
            preauthorized: true
            tags: "{{ tailscale_tags }}"
      expirySeconds: 300
    status_code: 200
  register: ts_reauth_key
  no_log: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_oauth_reauth is defined and ts_oauth_reauth is not skipped

# Running `tailscale up --authkey` on an already-connected node re-authenticates
# in-place — the node key (and therefore the Tailscale IP) is preserved.
- name: Re-auth node as persistent (was ephemeral)
  ansible.builtin.command:
    argv: >-
      {{ ['tailscale', 'up',
          '--authkey=' + ts_reauth_key.json.key,
          '--hostname=' + tailscale_hostname,
          '--accept-routes=' + (tailscale_accept_routes | lower),
          '--accept-dns=' + (tailscale_accept_dns | default(true) | lower)]
         + _ts_tags_argv
         + (['--advertise-exit-node'] if tailscale_advertise_exit_node else [])
         + _ts_routes_argv
         + (['--ssh'] if 'ssh' in (tailscale_services | default([])) else []) }}
  become: true
  no_log: true
  changed_when: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_reauth_key is defined and ts_reauth_key is not skipped

- name: Update device ACL tags via Tailscale API
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/device/{{ ts_device_id }}/tags"
    method: POST
    headers:
      Authorization: "Bearer {{ ts_oauth_device.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      tags: "{{ tailscale_tags }}"
    status_code: 200
  changed_when: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_tags_current != ts_tags_desired
    - ts_oauth_device is defined and ts_oauth_device is not skipped

- name: Tailscale already connected — skip join
  ansible.builtin.debug:
    msg: "Tailscale already running on {{ tailscale_hostname }}, settings applied."
  when:
    - tailscale_state == "present"
    - tailscale_is_running

- name: Tailscale disconnect (absent)
  ansible.builtin.command: tailscale down
  become: true
  failed_when: false
  changed_when: true
  when: tailscale_state == "absent"
