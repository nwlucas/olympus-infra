---
- name: Check if tailscale binary is already available
  ansible.builtin.command: which tailscale
  register: tailscale_which
  failed_when: false
  changed_when: false

- name: Install Tailscale via Homebrew (formula)
  community.general.homebrew:
    name: tailscale
    state: "{{ 'present' if tailscale_state == 'present' else 'absent' }}"
  when:
    - tailscale_which.rc != 0 or tailscale_state == "absent"

# Ensure the Tailscale LaunchDaemon is registered to start on boot.
# brew services start is idempotent — safe to run every time.
# Must run as root so the plist lands in /Library/LaunchDaemons (system-wide,
# survives reboots) rather than ~/Library/LaunchAgents (user-session only).
- name: Enable Tailscale LaunchDaemon (auto-start on boot)
  ansible.builtin.command: /opt/homebrew/bin/brew services start tailscale
  become: true
  register: ts_service_enable
  changed_when: "'Successfully started' in (ts_service_enable.stdout | default(''))"
  failed_when: false
  when: tailscale_state == "present"

# Check for a 100.x.x.x Tailscale address directly on the network interfaces.
# This works regardless of whether Tailscale is managed by the Mac app or the
# brew formula — the Mac app socket is inaccessible in non-GUI SSH sessions so
# `tailscale ip -4` is unreliable via Ansible.
- name: Check if node is already on the tailnet (interface check)
  ansible.builtin.shell: /sbin/ifconfig | grep -q "inet 100\."
  register: ts_ip_check
  failed_when: false
  changed_when: false
  when: tailscale_state == "present"

- name: Wait for Tailscale daemon to respond after service start
  ansible.builtin.command: tailscale status --json
  register: ts_status_pre
  retries: 10
  delay: 3
  until: ts_status_pre.rc == 0
  failed_when: false
  changed_when: false
  when:
    - tailscale_state == "present"
    - ts_ip_check.rc != 0

- name: Stop Tailscale service (macOS, absent)
  ansible.builtin.command: /opt/homebrew/bin/brew services stop tailscale
  become: true
  failed_when: false
  changed_when: true
  when: tailscale_state == "absent"

- name: Check Tailscale backend state
  ansible.builtin.command: tailscale status --json
  register: ts_status
  failed_when: false
  changed_when: false
  when: tailscale_state == "present"

- name: Set tailscale_is_running fact
  ansible.builtin.set_fact:
    tailscale_is_running: >-
      {{ ts_ip_check.rc == 0 or
         ((ts_status.stdout | from_json).BackendState == "Running"
          if (ts_status.rc is defined and ts_status.rc == 0 and ts_status.stdout | length > 0)
          else false) }}
  when: tailscale_state == "present"

# Build optional flag lists once — used by both join and set commands.
# Each produces an empty list when the variable is empty/undefined, so no
# flag is appended and the command stays clean regardless of input.
- name: Build optional Tailscale flag lists
  ansible.builtin.set_fact:
    _ts_tags_argv: >-
      {{ ['--advertise-tags=' + (tailscale_tags | join(','))]
         if (tailscale_tags | default([]) | length > 0) else [] }}
    _ts_routes_argv: >-
      {{ ['--advertise-routes=' + (tailscale_advertise_routes | join(','))]
         if (tailscale_advertise_routes | default([]) | length > 0) else [] }}
  when: tailscale_state == "present"

# ── Initial join (not yet connected) ──────────────────────────────────────

- name: Generate Tailscale auth key via OAuth API
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ tailscale_oauth_client_id }}"
      client_secret: "{{ tailscale_oauth_client_secret }}"
    status_code: 200
  register: ts_oauth_token
  no_log: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""

# ephemeral: false — node persists in the tailnet when offline so it keeps
# the same Tailscale IP across reboots and re-auths. Ephemeral nodes are
# removed on disconnect which causes IP churn.
- name: Create auth key via Tailscale API
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/tailnet/-/keys
    method: POST
    headers:
      Authorization: "Bearer {{ ts_oauth_token.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      capabilities:
        devices:
          create:
            reusable: false
            ephemeral: false
            preauthorized: true
            tags: "{{ tailscale_tags }}"
      expirySeconds: 300
    status_code: 200
  register: ts_auth_key
  no_log: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - tailscale_oauth_client_id != ""
    - ts_oauth_token is defined and ts_oauth_token.status == 200

- name: Join Tailscale network
  ansible.builtin.command:
    argv: >-
      {{ ['/opt/homebrew/bin/tailscale', 'up',
          '--authkey=' + ts_auth_key.json.key,
          '--hostname=' + tailscale_hostname,
          '--accept-routes=' + (tailscale_accept_routes | lower)]
         + _ts_tags_argv
         + (['--advertise-exit-node'] if tailscale_advertise_exit_node else [])
         + _ts_routes_argv
         + (['--ssh'] if 'ssh' in (tailscale_services | default([])) else []) }}
  no_log: true
  changed_when: true
  when:
    - tailscale_state == "present"
    - not tailscale_is_running
    - ts_auth_key is defined and (ts_auth_key.status | default(0)) == 200

# ── Enforce desired settings on already-connected node ────────────────────
# tailscale set is idempotent — safe to run every time; applies only what changed.

- name: Apply Tailscale settings (already connected)
  ansible.builtin.command:
    argv: >-
      {{ ['/opt/homebrew/bin/tailscale', 'set',
          '--accept-routes=' + (tailscale_accept_routes | lower),
          '--advertise-exit-node=' + (tailscale_advertise_exit_node | lower)]
         + _ts_routes_argv
         + (['--ssh=true', '--accept-risk=lose-ssh']
            if 'ssh' in (tailscale_services | default([])) else ['--ssh=false']) }}
  changed_when: false
  # When enabling Tailscale SSH over a Tailscale-routed connection the SSH session
  # is rerouted immediately and the connection drops — this is expected and the
  # command has already succeeded. Suppress both the error and unreachable state.
  ignore_errors: true
  ignore_unreachable: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running

# tailscale set does not support --advertise-tags. Use the Tailscale API to
# update ACL tags in-place — no re-auth, no IP change, no service interruption.
# Requires OAuth client to have devices:write scope (Settings → Trust credentials).
- name: Check if ACL tags need updating
  ansible.builtin.set_fact:
    ts_tags_current: "{{ (ts_status.stdout | from_json).Self.Tags | default([]) | sort }}"
    ts_tags_desired: "{{ tailscale_tags | default([]) | sort }}"
    ts_device_id: "{{ (ts_status.stdout | from_json).Self.ID }}"
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_status.rc == 0

- name: Get OAuth token for tag update
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ tailscale_oauth_client_id }}"
      client_secret: "{{ tailscale_oauth_client_secret }}"
    status_code: 200
  register: ts_oauth_tags
  no_log: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_tags_current != ts_tags_desired
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""

- name: Update device ACL tags via Tailscale API
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/device/{{ ts_device_id }}/tags"
    method: POST
    headers:
      Authorization: "Bearer {{ ts_oauth_tags.json.access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      tags: "{{ tailscale_tags }}"
    status_code: 200
  changed_when: true
  when:
    - tailscale_state == "present"
    - tailscale_is_running
    - ts_tags_current != ts_tags_desired
    - ts_oauth_tags is defined and ts_oauth_tags.status == 200

- name: Tailscale already connected — skip join
  ansible.builtin.debug:
    msg: "Tailscale already running on {{ tailscale_hostname }}, settings applied."
  when:
    - tailscale_state == "present"
    - tailscale_is_running

- name: Tailscale disconnect (absent)
  ansible.builtin.command: tailscale down
  failed_when: false
  changed_when: true
  when: tailscale_state == "absent"
