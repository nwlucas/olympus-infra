---
# --- PRESENT ---
- name: Install k3s
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode=0644" sh -
  args:
    creates: /usr/local/bin/k3s
    executable: /bin/bash
  become: true
  when: _k3s_state == 'present'

- name: Build k3s config content
  ansible.builtin.set_fact:
    _k3s_config: |
      write-kubeconfig-mode: "0644"
      {% if k3s_tls_san | default([]) | length > 0 %}
      tls-san:
      {% for san in k3s_tls_san %}
        - "{{ san }}"
      {% endfor %}
      {% endif %}
  when: _k3s_state == 'present'

- name: Write k3s config
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    content: "{{ _k3s_config }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart k3s
  when: _k3s_state == 'present'

- name: Remove k3s disable skip files (allow bundled components to redeploy)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/k3s/server/manifests/traefik.yaml.skip
    - /var/lib/rancher/k3s/server/manifests/traefik-crd.yaml.skip
    - /var/lib/rancher/k3s/server/manifests/servicelb.yaml.skip
  become: true
  notify: restart k3s
  when: _k3s_state == 'present'

- name: Remove orphaned Traefik CRDs from prior user-managed install
  ansible.builtin.shell: |
    set -o pipefail
    ORPHANS=$(kubectl get crd -o name 2>/dev/null | grep traefik.io | \
      xargs -I{} sh -c 'kubectl get {} -o jsonpath="{.metadata.labels.app\.kubernetes\.io/managed-by}" 2>/dev/null' | \
      grep -v "Helm" || true)
    if [ -n "$ORPHANS" ]; then
      kubectl get crd --no-headers 2>/dev/null | grep traefik.io | awk '{print $1}' | \
        xargs kubectl delete crd --ignore-not-found
    fi
  args:
    executable: /bin/bash
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false
  when: _k3s_state == 'present'
  ignore_errors: true

- name: Flush handlers (apply k3s config restart if needed)
  ansible.builtin.meta: flush_handlers

- name: Wait for k3s API to be available after config change
  ansible.builtin.command: kubectl get nodes
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: _k3s_api_ready
  until: _k3s_api_ready.rc == 0
  retries: 12
  delay: 5
  become: true
  changed_when: false
  when: _k3s_state == 'present'

- name: Ensure kubeconfig is world-readable
  ansible.builtin.file:
    path: "{{ k3s_kubeconfig_path }}"
    mode: "0644"
  become: true
  when: _k3s_state == 'present'
  failed_when: false

- name: Enable and start k3s service
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
  become: true
  when: _k3s_state == 'present'
  ignore_errors: "{{ ansible_check_mode }}"

- name: Wait for k3s to be ready
  ansible.builtin.command: kubectl get nodes
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: k3s_ready
  until: k3s_ready.rc == 0
  retries: 18
  delay: 10
  become: true
  changed_when: false
  when: _k3s_state == 'present'

- name: Create .kube directories for users
  ansible.builtin.file:
    path: "/home/{{ item }}/.kube"
    state: directory
    owner: "{{ item }}"
    mode: '0700'
  loop: "{{ k3s_kubeconfig_users }}"
  become: true
  when: _k3s_state == 'present'

- name: Copy kubeconfig for admin users
  ansible.builtin.copy:
    src: "{{ k3s_kubeconfig_path }}"
    dest: "/home/{{ item }}/.kube/config"
    owner: "{{ item }}"
    mode: '0600'
    remote_src: true
  loop: "{{ k3s_kubeconfig_users }}"
  become: true
  when: _k3s_state == 'present'

# Add FQDNs to /etc/hosts so the host can self-resolve its own names.
# Needed when the local router doesn't forward nwlnexus.net queries to Cloudflare.
- name: Add FQDN entries to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ansible_default_ipv4.address }} {{ item }}"
    state: present
  loop: "{{ k3s_tls_san | select('search', '\\.') | reject('match', '^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$') | list }}"
  become: true
  when:
    - _k3s_state == 'present'
    - k3s_tls_san | default([]) | length > 0

# Patch server URL in user kubeconfig copies for external FQDN access.
# The system kubeconfig (k3s_kubeconfig_path) is intentionally kept at 127.0.0.1
# so on-host tools (kubectl, ArgoCD role, etc.) work without DNS resolution.
- name: Patch kubeconfig server URL (user copies)
  ansible.builtin.replace:
    path: "/home/{{ item }}/.kube/config"
    regexp: 'server: https://127\.0\.0\.1:6443'
    replace: "server: https://{{ k3s_external_server }}:6443"
  loop: "{{ k3s_kubeconfig_users }}"
  become: true
  failed_when: false
  when:
    - _k3s_state == 'present'
    - k3s_external_server | default('') != ''

# --- ABSENT ---
- name: Run k3s uninstall script
  ansible.builtin.command: /usr/local/bin/k3s-uninstall.sh
  become: true
  failed_when: false
  changed_when: true
  when: _k3s_state == 'absent'
