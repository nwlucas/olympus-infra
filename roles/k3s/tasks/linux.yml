---
# ============================================================================
# k3s role — Linux tasks
# Supports both single-node (existing) and HA (compute-hub) modes.
# HA mode is enabled when k3s_ha: true in host/group vars.
# ============================================================================

# ── Shared: kube-vip static pod (HA only) ────────────────────────────────────
# Written BEFORE k3s installs so kube-vip starts with k3s on first boot.
# Must run on ALL server nodes (kube-vip does leader election across them).

# Detect which interface holds an IP in the same /24 as the VIP.
# Sets _k3s_vip_interface; falls back to k3s_vip_interface if none found.
# Requires network facts — playbook pre_tasks must include gather_subset: network.
- name: Detect LAN interface for kube-vip (matches VIP subnet)
  ansible.builtin.set_fact:
    _k3s_vip_interface: "{{ item }}"
  loop: "{{ ansible_facts['interfaces'] }}"
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)
    - item != 'lo'
    - (ansible_facts[item].ipv4.address | default(''))
      is match('^' + (k3s_vip | split('.'))[:3] | join('\\.') + '\\.')
  loop_control:
    label: "{{ item }}"

- name: Ensure k3s static manifests directory exists (HA)
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)

- name: Write kube-vip static pod manifest (HA)
  ansible.builtin.template:
    src: kube-vip.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
    owner: root
    group: root
    mode: "0644"
  become: true
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)

# ── HA: Read cluster token from 1Password ────────────────────────────────────

- name: Read k3s cluster token from 1Password (HA)
  ansible.builtin.command: "op read '{{ k3s_token_op_ref }}'"
  register: _k3s_token_raw
  no_log: true
  changed_when: false
  environment: "{{ _op_env }}"
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)
    - k3s_token_op_ref | default('') != ''

- name: Set k3s token fact (HA)
  ansible.builtin.set_fact:
    _k3s_token: "{{ _k3s_token_raw.stdout | trim }}"
  no_log: true
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)
    - _k3s_token_raw is defined and _k3s_token_raw.rc == 0

# ── HA: Dynamically resolve Tailscale FQDN for TLS SANs ─────────────────────
# Adds the local node's Tailscale IP and MagicDNS FQDN to the SAN list.
# Tailscale must already be joined (runs after the tailscale role).

- name: Get Tailscale status JSON (HA)
  ansible.builtin.command: tailscale status --json
  register: _ts_status_k3s
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)

- name: Build full TLS SAN list with Tailscale addresses (HA)
  ansible.builtin.set_fact:
    _k3s_full_tls_san: >-
      {{
        (k3s_tls_san | default([]))
        | union(
            [(_ts_status_k3s.stdout | from_json).Self.TailscaleIPs[0]]
            if (_ts_status_k3s.rc == 0
                and (_ts_status_k3s.stdout | from_json).Self.TailscaleIPs | default([]) | length > 0)
            else []
          )
        | union(
            [(_ts_status_k3s.stdout | from_json).Self.DNSName | regex_replace('\\.$', '')]
            if (_ts_status_k3s.rc == 0
                and (_ts_status_k3s.stdout | from_json).Self.DNSName | default('') != '')
            else []
          )
      }}
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)

# ── HA Primary: write k3s config (cluster-init) ───────────────────────────────

- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: _k3s_state == 'present'

- name: Write k3s config — primary (cluster-init, HA)
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      cluster-init: true
      token: "{{ _k3s_token }}"
      write-kubeconfig-mode: "0644"
      tls-san:
      {% for san in _k3s_full_tls_san | default(k3s_tls_san | default([])) %}
        - "{{ san }}"
      {% endfor %}
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)
    - k3s_primary | default(false)
    - k3s_init | default(false)

# ── HA Secondary: wait for primary API, then write config ────────────────────

- name: Wait for k3s VIP API to be accessible (secondary HA)
  ansible.builtin.wait_for:
    host: "{{ k3s_vip }}"
    port: 6443
    timeout: 600
    delay: 15
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)
    - not (k3s_primary | default(false))

- name: Write k3s config — secondary (join via VIP, HA)
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      server: "https://{{ k3s_vip }}:6443"
      token: "{{ _k3s_token }}"
      write-kubeconfig-mode: "0644"
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)
    - not (k3s_primary | default(false))

# ── Install k3s (HA path — reads from config.yaml) ───────────────────────────

- name: Install k3s (HA — primary and secondary, reads config.yaml)
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL https://get.k3s.io | \
      {% if k3s_version | default('latest') != 'latest' %}INSTALL_K3S_VERSION="{{ k3s_version }}" {% endif %}
      INSTALL_K3S_EXEC="server" \
      sh -
  args:
    creates: /usr/local/bin/k3s
    executable: /bin/bash
  become: true
  no_log: true
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)

# ── Install k3s (single-node legacy path) ─────────────────────────────────────

- name: Install k3s
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode=0644" sh -
  args:
    creates: /usr/local/bin/k3s
    executable: /bin/bash
  become: true
  when:
    - _k3s_state == 'present'
    - not (k3s_ha | default(false))

- name: Build k3s config content
  ansible.builtin.set_fact:
    _k3s_config: |
      write-kubeconfig-mode: "0644"
      {% if k3s_tls_san | default([]) | length > 0 %}
      tls-san:
      {% for san in k3s_tls_san %}
        - "{{ san }}"
      {% endfor %}
      {% endif %}
  when:
    - _k3s_state == 'present'
    - not (k3s_ha | default(false))

- name: Write k3s config
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    content: "{{ _k3s_config }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart k3s
  when:
    - _k3s_state == 'present'
    - not (k3s_ha | default(false))

- name: Remove k3s disable skip files (allow bundled components to redeploy)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/k3s/server/manifests/traefik.yaml.skip
    - /var/lib/rancher/k3s/server/manifests/traefik-crd.yaml.skip
    - /var/lib/rancher/k3s/server/manifests/servicelb.yaml.skip
  become: true
  notify: restart k3s
  when: _k3s_state == 'present'

- name: Remove orphaned Traefik CRDs from prior user-managed install
  ansible.builtin.shell: |
    set -o pipefail
    ORPHANS=$(kubectl get crd -o name 2>/dev/null | grep traefik.io | \
      xargs -I{} sh -c 'kubectl get {} -o jsonpath="{.metadata.labels.app\.kubernetes\.io/managed-by}" 2>/dev/null' | \
      grep -v "Helm" || true)
    if [ -n "$ORPHANS" ]; then
      kubectl get crd --no-headers 2>/dev/null | grep traefik.io | awk '{print $1}' | \
        xargs kubectl delete crd --ignore-not-found
    fi
  args:
    executable: /bin/bash
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false
  when: _k3s_state == 'present'
  ignore_errors: true

- name: Flush handlers (apply k3s config restart if needed)
  ansible.builtin.meta: flush_handlers

- name: Enable and start k3s service
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
  become: true
  when: _k3s_state == 'present'
  ignore_errors: "{{ ansible_check_mode }}"

- name: Wait for k3s API to be available
  ansible.builtin.command: kubectl get nodes
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: _k3s_api_ready
  until: _k3s_api_ready.rc == 0
  retries: 36
  delay: 10
  become: true
  changed_when: false
  when: _k3s_state == 'present'

- name: Ensure kubeconfig is world-readable
  ansible.builtin.file:
    path: "{{ k3s_kubeconfig_path }}"
    mode: "0644"
  become: true
  when: _k3s_state == 'present'
  failed_when: false

# ── CNI bridge fixer (workaround for k3s embedded CNI skipping bridge attach) ─
- name: Deploy k3s-cni-bridge-fixer script
  ansible.builtin.template:
    src: k3s-cni-bridge-fixer.sh.j2
    dest: /usr/local/bin/k3s-cni-bridge-fixer.sh
    owner: root
    group: root
    mode: '0755'
  become: true
  when: _k3s_state == 'present'

- name: Deploy k3s-cni-bridge-fixer systemd service
  ansible.builtin.template:
    src: k3s-cni-bridge-fixer.service.j2
    dest: /etc/systemd/system/k3s-cni-bridge-fixer.service
    owner: root
    group: root
    mode: '0644'
  become: true
  register: _cni_fixer_unit
  when: _k3s_state == 'present'

- name: Enable and start k3s-cni-bridge-fixer
  ansible.builtin.systemd:
    name: k3s-cni-bridge-fixer.service
    state: "{{ 'restarted' if _cni_fixer_unit.changed else 'started' }}"
    enabled: true
    daemon_reload: true
  become: true
  when: _k3s_state == 'present'

- name: Stop and remove k3s-cni-bridge-fixer (state=absent)
  ansible.builtin.systemd:
    name: k3s-cni-bridge-fixer.service
    state: stopped
    enabled: false
  become: true
  failed_when: false
  when: _k3s_state == 'absent'

- name: Create .kube directories for users
  ansible.builtin.file:
    path: "/home/{{ item }}/.kube"
    state: directory
    owner: "{{ item }}"
    mode: '0700'
  loop: "{{ k3s_kubeconfig_users }}"
  become: true
  when: _k3s_state == 'present'

- name: Copy kubeconfig for admin users
  ansible.builtin.copy:
    src: "{{ k3s_kubeconfig_path }}"
    dest: "/home/{{ item }}/.kube/config"
    owner: "{{ item }}"
    mode: '0600'
    remote_src: true
  loop: "{{ k3s_kubeconfig_users }}"
  become: true
  when: _k3s_state == 'present'

# Add FQDNs to /etc/hosts so the host can self-resolve its own names.
# Needed when the local router doesn't forward nwlnexus.net queries to Cloudflare.
- name: Add FQDN entries to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ansible_facts['default_ipv4']['address'] }} {{ item }}"
    state: present
  loop: "{{ k3s_tls_san | select('search', '\\.') | reject('match', '^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$') | list }}"
  become: true
  when:
    - _k3s_state == 'present'
    - k3s_tls_san | default([]) | length > 0

# Patch server URL in user kubeconfig copies for external FQDN access.
# The system kubeconfig (k3s_kubeconfig_path) is intentionally kept at 127.0.0.1
# so on-host tools (kubectl, Flux role, etc.) work without DNS resolution.
- name: Patch kubeconfig server URL (user copies)
  ansible.builtin.replace:
    path: "/home/{{ item }}/.kube/config"
    regexp: 'server: https://127\.0\.0\.1:6443'
    replace: "server: https://{{ k3s_external_server }}:6443"
  loop: "{{ k3s_kubeconfig_users }}"
  become: true
  failed_when: false
  when:
    - _k3s_state == 'present'
    - k3s_external_server | default('') != ''

# ── HA Primary: export kubeconfig to 1Password ───────────────────────────────
# Enables management-hub Headlamp to display compute-hub as a secondary cluster.
# Patches the server URL to the VIP before uploading.

- name: Export kubeconfig to 1Password (HA primary)
  when:
    - _k3s_state == 'present'
    - k3s_ha | default(false)
    - k3s_primary | default(false)
    - k3s_kubeconfig_op_item | default('') != ''
  block:
    - name: Read system kubeconfig (primary)
      ansible.builtin.slurp:
        src: "{{ k3s_kubeconfig_path }}"
      register: _k3s_kubeconfig_b64
      become: true

    - name: Patch kubeconfig server URL to external FQDN
      ansible.builtin.set_fact:
        _k3s_kubeconfig_patched: >-
          {{ (_k3s_kubeconfig_b64.content | b64decode)
             | regex_replace('server: https://127\\.0\\.0\\.1:6443',
                             'server: https://' + (k3s_external_server | default(k3s_vip)) + ':6443') }}

    - name: Check if kubeconfig document already exists in 1Password
      ansible.builtin.command: >
        op document get "{{ k3s_kubeconfig_op_item }}"
        --vault "{{ k3s_kubeconfig_op_vault }}"
      register: _k3s_op_doc_check
      failed_when: false
      changed_when: false
      environment:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('file', '/opt/ansible-pull/.op-service-account-token') }}"

    - name: Create kubeconfig document in 1Password (first time)
      ansible.builtin.shell: |
        echo '{{ _k3s_kubeconfig_patched }}' | \
          op document create - \
          --title "{{ k3s_kubeconfig_op_item }}" \
          --vault "{{ k3s_kubeconfig_op_vault }}" \
          --file-name "{{ k3s_kubeconfig_op_item }}.yaml"
      no_log: true
      changed_when: true
      environment:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('file', '/opt/ansible-pull/.op-service-account-token') }}"
      when: _k3s_op_doc_check.rc != 0

    - name: Update kubeconfig document in 1Password (subsequent runs)
      ansible.builtin.shell: |
        echo '{{ _k3s_kubeconfig_patched }}' | \
          op document edit "{{ k3s_kubeconfig_op_item }}" - \
          --vault "{{ k3s_kubeconfig_op_vault }}"
      no_log: true
      changed_when: true
      environment:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('file', '/opt/ansible-pull/.op-service-account-token') }}"
      when: _k3s_op_doc_check.rc == 0

# --- ABSENT ---
- name: Run k3s uninstall script
  ansible.builtin.command: /usr/local/bin/k3s-uninstall.sh
  become: true
  failed_when: false
  changed_when: true
  when: _k3s_state == 'absent'
