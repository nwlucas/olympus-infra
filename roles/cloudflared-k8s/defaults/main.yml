---
cloudflared_k8s_state: present
cloudflared_namespace: cloudflared
# Kubeconfig path and context — override for non-k3s clusters (e.g. OrbStack on macOS)
cloudflared_kubeconfig_path: "{{ k3s_kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
cloudflared_kubectl_context: ""       # empty = use default context in kubeconfig
cloudflared_kubectl_become: "{{ ansible_facts['system'] != 'Darwin' }}"  # false on macOS
cloudflared_tunnel_name: ""
# Prefer cloudflared_api_token var (from vault); fall back to file on host
cloudflared_api_token: ""
cloudflared_token_file: "/etc/olympus/cloudflare-api-token"
cloudflared_account_id: ""   # set in group_vars
cloudflared_image: "cloudflare/cloudflared:latest"
cloudflared_replicas: 1

# --- Route configuration ---
# Base domain for tunnel public hostnames (e.g. "example.com")
cloudflared_domain: ""
# Cloudflare zone ID — looked up dynamically from cloudflared_domain if empty
cloudflared_zone_id: ""
# Services to expose through the tunnel.
# Each entry maps a public subdomain to a k8s cluster service.
# The full public hostname will be: {{ subdomain }}.{{ cloudflared_domain }}
cloudflared_services:
  - subdomain: argocd
    k8s_service: "http://argocd-server.argocd:80"
  - subdomain: connect
    k8s_service: "http://connect-1password-connect.1password:8080"
  - subdomain: traefik
    k8s_service: "http://traefik-dashboard.traefik:9000"

# --- Bootstrap-only mode ---
# When true: create tunnel + seed k8s secret + configure catch-all ingress rule.
# Skip Deployment creation (ArgoCD handles that via GitOps).
cloudflared_bootstrap_only: false
# The ingress hostname for this cluster (e.g. ing.mgmt.nwlnexus.net).
# When set, Ansible creates the CNAME: <ingress_hostname> → <tunnel-uuid>.cfargotunnel.com
# and configures the tunnel catch-all rule to forward to cloudflared_catch_all_service.
cloudflared_ingress_hostname: ""
# The backend service cloudflared forwards all traffic to (catch-all rule).
# management-hub: https://traefik.kube-system:443
# ai-hub:         https://traefik.traefik:443
cloudflared_catch_all_service: "https://traefik.kube-system:443"
