---
- name: Set cloudflared-k8s state
  ansible.builtin.set_fact:
    _cf_k8s_state: "{{ cloudflared_k8s_state | default('present') }}"

# Build kubectl base command (with optional --context)
- name: Set kubectl base command
  ansible.builtin.set_fact:
    _kubectl: >-
      kubectl
      {%- if cloudflared_kubectl_context != '' %} --context {{ cloudflared_kubectl_context }}{% endif %}

# --- TOKEN RESOLUTION: prefer vault var, fall back to file on host ---
- name: Use vault-provided API token
  ansible.builtin.set_fact:
    cf_token: "{{ cloudflared_api_token }}"
  no_log: true
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_api_token != ""

- name: Check Cloudflare API token file (fallback)
  ansible.builtin.stat:
    path: "{{ cloudflared_token_file }}"
  register: cf_token_file
  become: "{{ cloudflared_kubectl_become }}"
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_api_token == ""

- name: Skip if token unavailable
  ansible.builtin.meta: end_play
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_api_token == ""
    - not cf_token_file.stat.exists or cf_token_file.stat.size == 0

- name: Read Cloudflare API token from file (fallback)
  ansible.builtin.slurp:
    src: "{{ cloudflared_token_file }}"
  register: cf_token_raw
  no_log: true
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_api_token == ""

- name: Set token fact from file (fallback)
  ansible.builtin.set_fact:
    cf_token: "{{ cf_token_raw.content | b64decode | trim }}"
  no_log: true
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_api_token == ""

- name: Create tunnel via Cloudflare API
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflared_account_id }}/cfd_tunnel"
    method: POST
    headers:
      Authorization: "Bearer {{ cf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ cloudflared_tunnel_name }}"
      config_src: cloudflare
    status_code: [200, 409]   # 409 = already exists
  register: tunnel_create
  no_log: true
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_tunnel_name != ""

- name: Get existing tunnel if already created
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflared_account_id }}/cfd_tunnel?name={{ cloudflared_tunnel_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  register: tunnel_list
  no_log: true
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_tunnel_name != ""

- name: Fail if tunnel not found
  ansible.builtin.fail:
    msg: "Tunnel '{{ cloudflared_tunnel_name }}' not found via Cloudflare API"
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_tunnel_name != ""
    - tunnel_list.json.result | length == 0

- name: Set tunnel ID
  ansible.builtin.set_fact:
    cloudflared_tunnel_id: "{{ tunnel_list.json.result[0].id }}"
  when:
    - _cf_k8s_state == 'present'
    - tunnel_list.json.result | length > 0

- name: Create cloudflared namespace
  ansible.builtin.command: "{{ _kubectl }} create namespace {{ cloudflared_namespace }}"
  register: cf_ns_create
  failed_when:
    - cf_ns_create.rc != 0
    - "'already exists' not in cf_ns_create.stderr"
  changed_when: cf_ns_create.rc == 0
  become: "{{ cloudflared_kubectl_become }}"
  environment:
    KUBECONFIG: "{{ cloudflared_kubeconfig_path }}"
  when: _cf_k8s_state == 'present'

- name: Get tunnel token
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflared_account_id }}/cfd_tunnel/{{ cloudflared_tunnel_id }}/token"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  register: tunnel_token_resp
  no_log: true
  when: _cf_k8s_state == 'present'

- name: Create cloudflared tunnel secret
  ansible.builtin.shell: |
    set -o pipefail
    {{ _kubectl }} create secret generic cloudflared-creds \
      --from-literal=tunnel-token={{ tunnel_token_resp.json.result }} \
      -n {{ cloudflared_namespace }} \
      --dry-run=client -o yaml | {{ _kubectl }} apply -f -
  args:
    executable: /bin/bash
  become: "{{ cloudflared_kubectl_become }}"
  environment:
    KUBECONFIG: "{{ cloudflared_kubeconfig_path }}"
  no_log: true
  changed_when: true
  when: _cf_k8s_state == 'present'

- name: Render cloudflared Deployment
  ansible.builtin.template:
    src: deployment.yaml.j2
    dest: /tmp/cloudflared-deployment.yaml
    mode: '0600'
  when: _cf_k8s_state == 'present'

- name: Apply cloudflared Deployment to cluster
  ansible.builtin.command: "{{ _kubectl }} apply -f /tmp/cloudflared-deployment.yaml"
  become: "{{ cloudflared_kubectl_become }}"
  environment:
    KUBECONFIG: "{{ cloudflared_kubeconfig_path }}"
  changed_when: true
  when: _cf_k8s_state == 'present'

- name: Wait for cloudflared rollout to complete
  ansible.builtin.command: >
    {{ _kubectl }} rollout status deployment/cloudflared
    -n {{ cloudflared_namespace }}
    --timeout=120s
  become: "{{ cloudflared_kubectl_become }}"
  environment:
    KUBECONFIG: "{{ cloudflared_kubeconfig_path }}"
  changed_when: false
  when: _cf_k8s_state == 'present'

# --- ROUTE CONFIGURATION (skipped if cloudflared_domain is empty) ---
- name: Wait for tunnel to show active connections
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflared_account_id }}/cfd_tunnel/{{ cloudflared_tunnel_id }}/connections"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  register: _cf_connections
  no_log: true
  until: (_cf_connections.json.result | default([]) | length) > 0
  retries: 18
  delay: 10
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""

- name: Look up Cloudflare zone ID for domain
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones?name={{ cloudflared_domain }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  register: _cf_zone
  no_log: true
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""
    - cloudflared_zone_id == ""

- name: Fail if zone not found for domain
  ansible.builtin.fail:
    msg: "No Cloudflare zone found for domain '{{ cloudflared_domain }}'"
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""
    - cloudflared_zone_id == ""
    - (_cf_zone.json.result | default([]) | length) == 0

- name: Set resolved zone ID fact
  ansible.builtin.set_fact:
    _cf_zone_id: >-
      {{ cloudflared_zone_id if cloudflared_zone_id != ''
         else _cf_zone.json.result[0].id }}
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""

- name: Build ingress list from cloudflared_services
  ansible.builtin.set_fact:
    _cf_ingress_routes: >-
      {{ _cf_ingress_routes | default([])
         + [{'hostname': item.subdomain + '.' + cloudflared_domain,
             'service': item.k8s_service}] }}
  loop: "{{ cloudflared_services }}"
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""

- name: Configure tunnel ingress routes (managed config PUT)
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflared_account_id }}/cfd_tunnel/{{ cloudflared_tunnel_id }}/configurations"
    method: PUT
    headers:
      Authorization: "Bearer {{ cf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      config:
        ingress: "{{ _cf_ingress_routes + [{'service': 'http_status:404'}] }}"
    status_code: 200
  no_log: true
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""
    - _cf_ingress_routes | default([]) | length > 0

- name: Check existing CNAME DNS records for each service
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ _cf_zone_id }}/dns_records?type=CNAME&name={{ item.subdomain }}.{{ cloudflared_domain }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cf_token }}"
    status_code: 200
  register: _cf_dns_check
  no_log: true
  loop: "{{ cloudflared_services }}"
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""

- name: Create CNAME DNS records for new services
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ _cf_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ cf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: CNAME
      name: "{{ item.item.subdomain }}.{{ cloudflared_domain }}"
      content: "{{ cloudflared_tunnel_id }}.cfargotunnel.com"
      proxied: true
      ttl: 1
    status_code: 200
  no_log: true
  loop: "{{ _cf_dns_check.results }}"
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""
    - item.json.result | length == 0

- name: Update CNAME DNS records where tunnel target changed
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ _cf_zone_id }}/dns_records/{{ item.json.result[0].id }}"
    method: PATCH
    headers:
      Authorization: "Bearer {{ cf_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      content: "{{ cloudflared_tunnel_id }}.cfargotunnel.com"
      proxied: true
    status_code: 200
  no_log: true
  loop: "{{ _cf_dns_check.results }}"
  when:
    - _cf_k8s_state == 'present'
    - cloudflared_domain != ""
    - item.json.result | length > 0
    - item.json.result[0].content != cloudflared_tunnel_id + '.cfargotunnel.com'

# --- ABSENT ---
- name: Tear down cloudflared k8s resources
  ansible.builtin.command: "{{ _kubectl }} delete namespace {{ cloudflared_namespace }}"
  become: "{{ cloudflared_kubectl_become }}"
  environment:
    KUBECONFIG: "{{ cloudflared_kubeconfig_path }}"
  failed_when: false
  changed_when: true
  when: _cf_k8s_state == 'absent'
