---
ansible_pull_state: present
ansible_pull_repo: https://github.com/nwlucas/olympus-infra.git
ansible_pull_hour: "2"
ansible_pull_minute: "0"

# Set per-host in inventory group_vars
ansible_pull_inventory: ""   # e.g. inventory/management.yml
ansible_pull_playbook: ""    # e.g. playbooks/pull/management.yml

# macOS: path to ansible-pull binary installed via Homebrew
ansible_pull_bin_macos: /opt/homebrew/bin/ansible-pull
# Linux: usually on PATH for the ansible user
ansible_pull_bin_linux: /usr/bin/ansible-pull

ansible_pull_log_dir: /var/log/ansible-pull
ansible_pull_log_file: "{{ ansible_pull_log_dir }}/ansible.log"
