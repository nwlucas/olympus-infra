---
# vibe-kanban: Docker Compose deployment on macOS (ai-hub).
# TLS terminated by Traefik in OrbStack k8s; no Caddy.
# Secrets fetched from 1Password Connect at run time.

- name: Vibe Kanban — fetch DB password from 1Password Connect
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/op read "op://Dev/{{ vibe_kanban_op_item }}/db-password"
  register: _vk_db_password
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — fetch JWT secret from 1Password Connect
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/op read "op://Dev/{{ vibe_kanban_op_item }}/jwt-secret"
  register: _vk_jwt_secret
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — fetch Electric role password from 1Password Connect
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/op read "op://Dev/{{ vibe_kanban_op_item }}/electric-role-password"
  register: _vk_electric_password
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — fetch Google OAuth client ID from 1Password Connect
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/op read "op://Dev/{{ vibe_kanban_google_oauth_op_item }}/client-id"
  register: _vk_google_client_id
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — fetch Google OAuth client secret from 1Password Connect
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/op read "op://Dev/{{ vibe_kanban_google_oauth_op_item }}/client-secret"
  register: _vk_google_client_secret
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — set secret facts
  ansible.builtin.set_fact:
    _vk_secrets:
      db_password: "{{ _vk_db_password.stdout | trim }}"
      jwt_secret: "{{ _vk_jwt_secret.stdout | trim }}"
      electric_password: "{{ _vk_electric_password.stdout | trim }}"
      google_client_id: "{{ _vk_google_client_id.stdout | trim }}"
      google_client_secret: "{{ _vk_google_client_secret.stdout | trim }}"
  no_log: true
  when: vibe_kanban_state == "present"

# --- Deploy ---

- name: Vibe Kanban — create compose directory
  ansible.builtin.file:
    path: "{{ vibe_kanban_compose_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0750"
  become: true
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — write docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: "{{ vibe_kanban_compose_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: "0640"
  become: true
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — write .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ vibe_kanban_compose_dir }}/.env"
    owner: "{{ ansible_user }}"
    mode: "0600"
  become: true
  no_log: true
  when: vibe_kanban_state == "present"

- name: Vibe Kanban — start services
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/docker compose up -d --pull always
    chdir: "{{ vibe_kanban_compose_dir }}"
  environment:
    HOME: "{{ ansible_env.HOME }}"
  changed_when: true
  when: vibe_kanban_state == "present"

# --- Teardown ---

- name: Vibe Kanban — stop and remove services
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/docker compose down -v
    chdir: "{{ vibe_kanban_compose_dir }}"
  environment:
    HOME: "{{ ansible_env.HOME }}"
  failed_when: false
  changed_when: true
  when: vibe_kanban_state == "absent"

- name: Vibe Kanban — remove compose directory
  ansible.builtin.file:
    path: "{{ vibe_kanban_compose_dir }}"
    state: absent
  become: true
  when: vibe_kanban_state == "absent"
