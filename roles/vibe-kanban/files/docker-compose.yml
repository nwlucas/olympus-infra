# roles/vibe-kanban/files/docker-compose.yml
name: vibe-kanban

# Secrets come from .env (written by Ansible from 1Password).
# PostgreSQL runs natively on the host (Homebrew postgresql@16).
# Reach host services via host.docker.internal.

services:
  electric:
    image: electricsql/electric:1.4.13
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vibe_kanban:${DB_PASSWORD}@host.docker.internal:5432/vibe_kanban?sslmode=disable
      ELECTRIC_SECRET: ${ELECTRIC_ROLE_PASSWORD}

  remote-server:
    image: ghcr.io/nwlucas/vibe-kanban:remote-v0.1.27
    # Upstream image is amd64-only; ai-hub is Apple Silicon (arm64) running
    # Colima. Force amd64 emulation for vibe-kanban services.
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      RUST_LOG: info,remote=info
      SERVER_DATABASE_URL: postgres://vibe_kanban:${DB_PASSWORD}@host.docker.internal:5432/vibe_kanban
      SERVER_LISTEN_ADDR: 0.0.0.0:8081
      ELECTRIC_URL: http://electric:3000
      SERVER_PUBLIC_BASE_URL: https://${DOMAIN}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET}
      ELECTRIC_ROLE_PASSWORD: ${ELECTRIC_ROLE_PASSWORD}
    depends_on:
      electric:
        condition: service_started

  worker:
    image: ghcr.io/nwlucas/vibe-kanban:worker-0.1.36
    platform: linux/amd64
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/vk-init.sh"]
    command: ["vibe-kanban"]
    # Publish the worker's local UI on the host so it's reachable over
    # Tailscale at http://<ai-hub-tailscale-ip>:8083 — needed to generate
    # the one-time pairing code from Settings -> Remote Access.
    ports:
      - "8083:8083"
      - "8084:8084"
    volumes:
      - ./worker-init.sh:/vk-init.sh:ro
      - worker-home:/home/node
    environment:
      RUST_LOG: info
      VK_TUNNEL: "1"
      VK_ALLOWED_ORIGINS: https://${DOMAIN}
      # Pin worker UI ports + bind address so we can reach it via Tailscale
      # (defaults: random port + 127.0.0.1, not externally accessible).
      HOST: "0.0.0.0"
      BACKEND_PORT: "8083"
      PREVIEW_PROXY_PORT: "8084"
      # Point worker at OUR self-hosted backend instead of the SaaS defaults
      # (api.vibekanban.com). Without these the worker registers with the
      # upstream SaaS and won't show up as a pairable host in our cloud UI.
      VK_SHARED_API_BASE: https://${DOMAIN}
      VK_SHARED_RELAY_API_BASE: https://vk-relay.nwlnexus.net
      ANTHROPIC_BASE_URL: http://host.docker.internal:4000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_OLYMPUS_TOKEN: ${GITHUB_OLYMPUS_TOKEN}
      GITHUB_WORK_TOKEN: ${GITHUB_WORK_TOKEN}
    depends_on:
      remote-server:
        condition: service_started

  relay:
    image: ghcr.io/nwlucas/vibe-kanban:relay-v0.1.7
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://vibe_kanban:${DB_PASSWORD}@host.docker.internal:5432/vibe_kanban
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET}

volumes:
  worker-home:
