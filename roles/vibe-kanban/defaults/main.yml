---
vibe_kanban_state: present
# /opt/ is not shared into the Colima VM by default; bind mounts in compose
# fail silently (Docker creates empty directories at the mount source path).
# Put the compose dir under the user's home, which Colima mounts as /Users/...
vibe_kanban_compose_dir: "{{ ansible_facts['env']['HOME'] }}/vibe-kanban"
vibe_kanban_domain: vibe.nwlnexus.net
# 1Password item names — fetched at run time via op read
vibe_kanban_op_item: vibe-kanban
vibe_kanban_google_oauth_op_item: google-oauth-olympus
