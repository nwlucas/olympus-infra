---
- name: Bootstrap user — Linux
  ansible.builtin.include_tasks: linux.yml
  when: ansible_os_family != "Darwin"

- name: Bootstrap user — macOS
  ansible.builtin.include_tasks: macos.yml
  when: ansible_os_family == "Darwin"

- name: Ensure /etc/olympus credential directory exists
  ansible.builtin.file:
    path: "{{ bootstrap_creds_dest }}"
    state: directory
    owner: "{{ bootstrap_user_name }}"
    group: "{{ 'sudo' if ansible_os_family != 'Darwin' else 'admin' }}"
    mode: "0750"
  become: true

- name: Check for credential files in source directory
  ansible.builtin.find:
    paths: "{{ bootstrap_creds_src }}"
    recurse: false
  register: cred_files
  delegate_to: localhost
  become: false
  when: bootstrap_user_state == "present"

- name: Copy credential files to /etc/olympus
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ bootstrap_creds_dest }}/{{ item.path | basename }}"
    owner: "{{ bootstrap_user_name }}"
    group: "{{ 'sudo' if ansible_os_family != 'Darwin' else 'admin' }}"
    mode: "0640"
  become: true
  loop: "{{ cred_files.files }}"
  when:
    - bootstrap_user_state == "present"
    - cred_files.files | length > 0
