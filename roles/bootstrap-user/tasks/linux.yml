---
- name: Create ansible user (Linux)
  ansible.builtin.user:
    name: "{{ bootstrap_user_name }}"
    home: "{{ bootstrap_user_home_linux }}"
    shell: "{{ bootstrap_user_shell }}"
    groups: sudo
    append: true
    create_home: true
    state: "{{ bootstrap_user_state }}"
  become: true

- name: Grant ansible user passwordless sudo (Linux)
  ansible.builtin.copy:
    content: "{{ bootstrap_user_name }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ bootstrap_user_name }}"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  become: true
  when: bootstrap_user_state == "present"

- name: Remove ansible sudoers file (Linux)
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ bootstrap_user_name }}"
    state: absent
  become: true
  when: bootstrap_user_state == "absent"

- name: Ensure ansible .ssh directory exists (Linux)
  ansible.builtin.file:
    path: "{{ bootstrap_user_home_linux }}/.ssh"
    state: directory
    owner: "{{ bootstrap_user_name }}"
    group: "{{ bootstrap_user_name }}"
    mode: "0700"
  become: true
  when: bootstrap_user_state == "present"

- name: Ensure ansible-pull log directory exists (Linux)
  ansible.builtin.file:
    path: /var/log/ansible-pull
    state: directory
    owner: "{{ bootstrap_user_name }}"
    group: "{{ bootstrap_user_name }}"
    mode: "0755"
  become: true
  when: bootstrap_user_state == "present"

- name: Create /etc/olympus credential directory
  ansible.builtin.file:
    path: "{{ bootstrap_creds_dest }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true
  when: bootstrap_user_state == "present"

- name: Stat each credential file on the controller
  ansible.builtin.stat:
    path: "{{ bootstrap_creds_src }}/{{ item }}"
  register: cred_stat
  loop: "{{ bootstrap_cred_files }}"
  delegate_to: localhost
  become: false
  when: bootstrap_user_state == "present"

- name: Copy credential files to /etc/olympus
  ansible.builtin.copy:
    src: "{{ bootstrap_creds_src }}/{{ item.item }}"
    dest: "{{ bootstrap_creds_dest }}/{{ item.item }}"
    owner: "{{ bootstrap_user_name }}"
    group: "{{ bootstrap_user_name }}"
    mode: "0600"
  loop: "{{ cred_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - bootstrap_user_state == "present"
    - item.stat.exists
    - item.stat.size > 0
  become: true

- name: Warn about missing credential files
  ansible.builtin.debug:
    msg: "WARNING: {{ item.item }} not found at {{ bootstrap_creds_src }}/ — skipping"
  loop: "{{ cred_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - bootstrap_user_state == "present"
    - not item.stat.exists

- name: Write 1Password credentials JSON from vault var
  ansible.builtin.copy:
    content: "{{ onepassword_credentials_json }}"
    dest: "{{ bootstrap_creds_dest }}/1password-credentials.json"
    owner: "{{ bootstrap_user_name }}"
    group: "{{ bootstrap_user_name }}"
    mode: "0600"
  become: true
  no_log: true
  when:
    - bootstrap_user_state == "present"
    - onepassword_credentials_json != ""
