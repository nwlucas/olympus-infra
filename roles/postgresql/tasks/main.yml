---
- name: Install postgresql@{{ postgresql_version }} via Homebrew
  community.general.homebrew:
    name: "postgresql@{{ postgresql_version }}"
    state: "{{ 'present' if postgresql_state == 'present' else 'absent' }}"
  become: false

- name: Start PostgreSQL via brew services
  ansible.builtin.command: >
    /opt/homebrew/bin/brew services start postgresql@{{ postgresql_version }}
  register: _pg_start
  changed_when: "'Successfully started' in _pg_start.stdout"
  # "Bootstrap failed: 5" = launchctl error when LaunchAgent is already loaded
  failed_when:
    - _pg_start.rc != 0
    - "'already started' not in (_pg_start.stderr | default(''))"
    - "'Bootstrap failed' not in (_pg_start.stderr | default(''))"
  become: false
  when: postgresql_state == "present"

- name: Wait for PostgreSQL to accept connections
  # postgresql@16 is keg-only — binaries are NOT in /opt/homebrew/bin
  ansible.builtin.command: >
    /opt/homebrew/opt/postgresql@{{ postgresql_version }}/bin/pg_isready
    -h 127.0.0.1 -p {{ postgresql_port }}
  register: _pg_ready
  until: _pg_ready.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  become: false
  when: postgresql_state == "present"

- name: Patch listen_addresses in postgresql.conf
  # Do NOT replace the full file — Homebrew ships 250+ lines of tuning
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dest }}"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
    state: present
  notify: Restart PostgreSQL
  when: postgresql_state == "present"

- name: Patch port in postgresql.conf
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dest }}"
    regexp: "^#?port ="
    line: "port = {{ postgresql_port }}"
    state: present
  notify: Restart PostgreSQL
  when: postgresql_state == "present"

- name: Set wal_level = logical (required by ElectricSQL)
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dest }}"
    regexp: "^#?wal_level"
    line: "wal_level = logical"
    state: present
  notify: Restart PostgreSQL
  when: postgresql_state == "present"

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgresql_hba_dest }}"
    owner: "{{ ansible_user }}"
    mode: "0600"
  notify: Restart PostgreSQL
  when: postgresql_state == "present"

- name: Fetch vibe-kanban DB password from 1Password Connect
  ansible.builtin.command: /opt/homebrew/bin/op read "op://Dev/vibe-kanban/db-password"
  register: _pg_vk_password
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: postgresql_state == "present"

# Use psql directly instead of community.postgresql modules — avoids the
# psycopg2-binary dependency, which can't be installed on Apple's CLT Python
# (no --break-system-packages support) and shouldn't pollute Homebrew Python.
# Trust auth on 127.0.0.1 (set in pg_hba.conf) lets ansible_user connect
# as the Homebrew-created superuser without a password.

- name: Check if vibe_kanban database exists
  ansible.builtin.command: >
    /opt/homebrew/opt/postgresql@{{ postgresql_version }}/bin/psql
    -h 127.0.0.1 -p {{ postgresql_port }} -d postgres
    -tA -c "SELECT 1 FROM pg_database WHERE datname='vibe_kanban'"
  register: _pg_db_check
  changed_when: false
  become: false
  when: postgresql_state == "present"

- name: Create vibe_kanban database
  ansible.builtin.command: >
    /opt/homebrew/opt/postgresql@{{ postgresql_version }}/bin/psql
    -h 127.0.0.1 -p {{ postgresql_port }} -d postgres
    -c "CREATE DATABASE vibe_kanban"
  register: _pg_db_create
  changed_when: "'CREATE DATABASE' in (_pg_db_create.stdout | default(''))"
  become: false
  when:
    - postgresql_state == "present"
    - (_pg_db_check.stdout | default('') | trim) != "1"

- name: Create or update vibe_kanban user (with REPLICATION for Electric)
  # REPLICATION attribute is required by ElectricSQL (uses logical replication)
  ansible.builtin.command:
    argv:
      - /opt/homebrew/opt/postgresql@{{ postgresql_version }}/bin/psql
      - -h
      - "127.0.0.1"
      - -p
      - "{{ postgresql_port }}"
      - -d
      - postgres
      - -c
      - |
        DO $$ BEGIN
          IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'vibe_kanban') THEN
            CREATE USER vibe_kanban WITH REPLICATION PASSWORD '{{ _pg_vk_password.stdout | trim }}';
          ELSE
            ALTER USER vibe_kanban WITH REPLICATION PASSWORD '{{ _pg_vk_password.stdout | trim }}';
          END IF;
        END $$;
  register: _pg_user_upsert
  no_log: true
  changed_when: true
  become: false
  when: postgresql_state == "present"

- name: Make vibe_kanban user the owner of vibe_kanban database
  # Ownership grants full schema rights (PostgreSQL 15+ locks down 'public' by default)
  ansible.builtin.command: >
    /opt/homebrew/opt/postgresql@{{ postgresql_version }}/bin/psql
    -h 127.0.0.1 -p {{ postgresql_port }} -d postgres
    -c "ALTER DATABASE vibe_kanban OWNER TO vibe_kanban"
  register: _pg_owner
  changed_when: "'ALTER DATABASE' in (_pg_owner.stdout | default(''))"
  become: false
  when: postgresql_state == "present"

- name: Grant all on schema public to vibe_kanban user
  # Needed for remote-server's diesel migrations (PG15+ public schema lockdown)
  ansible.builtin.command: >
    /opt/homebrew/opt/postgresql@{{ postgresql_version }}/bin/psql
    -h 127.0.0.1 -p {{ postgresql_port }} -d vibe_kanban
    -c "GRANT ALL ON SCHEMA public TO vibe_kanban"
  register: _pg_schema_grant
  changed_when: "'GRANT' in (_pg_schema_grant.stdout | default(''))"
  become: false
  when: postgresql_state == "present"

- name: Grant all privileges on vibe_kanban database to vibe_kanban user
  ansible.builtin.command: >
    /opt/homebrew/opt/postgresql@{{ postgresql_version }}/bin/psql
    -h 127.0.0.1 -p {{ postgresql_port }} -d postgres
    -c "GRANT ALL PRIVILEGES ON DATABASE vibe_kanban TO vibe_kanban"
  register: _pg_grant
  changed_when: "'GRANT' in (_pg_grant.stdout | default(''))"
  become: false
  when: postgresql_state == "present"

- name: Stop and remove PostgreSQL
  ansible.builtin.command: >
    /opt/homebrew/bin/brew services stop postgresql@{{ postgresql_version }}
  register: _pg_stop
  failed_when:
    - _pg_stop.rc != 0
    - "'not started' not in (_pg_stop.stderr | default(''))"
    - "'Could not find' not in (_pg_stop.stderr | default(''))"
  changed_when: "'Successfully stopped' in (_pg_stop.stdout | default(''))"
  become: false
  when: postgresql_state == "absent"
