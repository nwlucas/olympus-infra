---
- name: Set argocd state
  ansible.builtin.set_fact:
    _argocd_state: "{{ argocd_state | default('present') }}"

- name: Add ArgoCD Helm repo
  ansible.builtin.command: >
    helm repo add argo https://argoproj.github.io/argo-helm
  register: repo_add
  changed_when: "'already exists' not in repo_add.stderr"
  become: true
  when: _argocd_state == 'present'

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  become: true
  changed_when: false
  when: _argocd_state == 'present'

- name: Create argocd namespace
  ansible.builtin.command: kubectl create namespace {{ argocd_namespace }}
  register: ns_create
  failed_when:
    - ns_create.rc != 0
    - "'already exists' not in ns_create.stderr"
  changed_when: ns_create.rc == 0
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  when: _argocd_state == 'present'

- name: Install ArgoCD via Helm
  ansible.builtin.command: >
    helm upgrade --install argocd argo/argo-cd
    --namespace {{ argocd_namespace }}
    --version {{ argocd_chart_version }}
    --set server.service.type=NodePort
    --set server.service.nodePortHttp={{ argocd_nodeport | default(30080) }}
    --set configs.params."server\.insecure"=true
    --wait --timeout 5m
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  when: _argocd_state == 'present'

- name: Restart ArgoCD server to pick up ConfigMap changes
  ansible.builtin.command: kubectl rollout restart deployment/argocd-server -n {{ argocd_namespace }}
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  when: _argocd_state == 'present'

- name: Wait for ArgoCD server rollout
  ansible.builtin.command: kubectl rollout status deployment/argocd-server -n {{ argocd_namespace }} --timeout=120s
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false
  when: _argocd_state == 'present'

- name: Get ArgoCD initial admin password
  ansible.builtin.shell: |
    set -o pipefail
    kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret \
      -o jsonpath="{.data.password}" | base64 -d
  args:
    executable: /bin/bash
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: argocd_initial_password
  changed_when: false
  when: _argocd_state == 'present'

- name: Print ArgoCD initial admin password
  ansible.builtin.debug:
    msg: "ArgoCD initial admin password: {{ argocd_initial_password.stdout }}"
  when: _argocd_state == 'present'

# --- TRAEFIK INGRESSROUTE ---
- name: Render ArgoCD Traefik IngressRoute
  ansible.builtin.template:
    src: traefik-ingressroute.yaml.j2
    dest: /tmp/argocd-ingressroute.yaml
    mode: '0600'
  when:
    - _argocd_state == 'present'
    - argocd_hostname != ""

- name: Apply ArgoCD Traefik IngressRoute
  ansible.builtin.command: kubectl apply -f /tmp/argocd-ingressroute.yaml
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  when:
    - _argocd_state == 'present'
    - argocd_hostname != ""

# --- CLUSTER REGISTRATION ---
# Runs when argocd_register_cluster: true regardless of argocd_state.
# Use case: ai-hub registers its OrbStack cluster with management-hub ArgoCD
# but does NOT install ArgoCD itself (argocd_state: absent).

- name: Install argocd CLI (macOS)
  community.general.homebrew:
    name: argocd
    state: present
  become: false
  when:
    - argocd_register_cluster | default(false)
    - ansible_system == 'Darwin'

# Dynamically resolve management host Tailscale IP via API
- name: Get Tailscale OAuth token (for management IP lookup)
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ tailscale_oauth_client_id }}"
      client_secret: "{{ tailscale_oauth_client_secret }}"
    status_code: 200
  register: _ts_mgmt_oauth
  no_log: true
  when:
    - argocd_register_cluster | default(false)
    - tailscale_oauth_client_id | default('') != ''
    - tailscale_oauth_client_secret | default('') != ''

- name: List Tailscale devices
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/tailnet/-/devices?fields=default"
    method: GET
    headers:
      Authorization: "Bearer {{ _ts_mgmt_oauth.json.access_token }}"
    status_code: 200
  register: _ts_devices
  no_log: true
  when:
    - argocd_register_cluster | default(false)
    - _ts_mgmt_oauth is defined
    - _ts_mgmt_oauth.status | default(0) == 200

- name: Set management_tailscale_ip from Tailscale API
  ansible.builtin.set_fact:
    management_tailscale_ip: >-
      {{ _ts_devices.json.devices
         | selectattr('hostname', 'equalto', argocd_management_hostname)
         | map(attribute='addresses')
         | first
         | select('match', '^[\d.]+$')
         | first }}
  no_log: true
  when:
    - argocd_register_cluster | default(false)
    - _ts_devices is defined
    - _ts_devices.status | default(0) == 200
    - (_ts_devices.json.devices | selectattr('hostname', 'equalto', argocd_management_hostname) | list | length) > 0

- name: Fail if management Tailscale IP could not be resolved
  ansible.builtin.fail:
    msg: >
      Could not resolve Tailscale IP for host '{{ argocd_management_hostname }}'.
      Check that the device is online and that tailscale_oauth_client_id/secret are set.
  when:
    - argocd_register_cluster | default(false)
    - management_tailscale_ip | default('') == ''

- name: Get local Tailscale IP (for cluster API server URL)
  ansible.builtin.command: /opt/homebrew/bin/tailscale ip -4
  register: _local_tailscale_ip
  changed_when: false
  become: false
  when: argocd_register_cluster | default(false)

- name: Create temp kubeconfig with proxy server URL for ArgoCD cluster registration
  ansible.builtin.shell: |
    set -o pipefail
    KUBECONFIG={{ ansible_env.HOME }}/.kube/config \
      kubectl config view --raw --minify --context {{ argocd_cluster_context }} \
        > /tmp/argocd-cluster-reg-kubeconfig.yml
    KUBECONFIG=/tmp/argocd-cluster-reg-kubeconfig.yml \
      kubectl config set-cluster {{ argocd_cluster_context }} \
        --server=https://{{ _local_tailscale_ip.stdout | trim }}:{{ argocd_k8s_proxy_port | default(6443) }} \
        --insecure-skip-tls-verify=true
  args:
    executable: /bin/bash
  changed_when: false
  become: false
  when: argocd_register_cluster | default(false)

- name: Fetch ArgoCD admin password from 1Password Connect
  ansible.builtin.command: /opt/homebrew/bin/op read "op://Dev/olympus-sdk-argocd/password"
  register: _argocd_admin_password
  no_log: true
  changed_when: false
  environment:
    OP_CONNECT_HOST: "{{ onepassword_connect_host }}"
    OP_CONNECT_TOKEN: "{{ vault_onepassword_connect_token }}"
  when: argocd_register_cluster | default(false)

- name: Log in to ArgoCD CLI
  ansible.builtin.command: >
    /opt/homebrew/bin/argocd login {{ argocd_login_server }}
    --username admin
    --password {{ _argocd_admin_password.stdout | trim }}
    --plaintext
  no_log: false
  changed_when: true
  when: argocd_register_cluster | default(false)

- name: Register cluster in ArgoCD
  ansible.builtin.command: >
    /opt/homebrew/bin/argocd cluster add {{ argocd_cluster_context }}
    --name {{ argocd_cluster_name }}
    --kubeconfig /tmp/argocd-cluster-reg-kubeconfig.yml
    --insecure
    --yes
  changed_when: true
  when: argocd_register_cluster | default(false)

- name: Create ArgoCD Applications from gitops repo
  ansible.builtin.command: >
    /opt/homebrew/bin/argocd app create {{ item.name }}
    --repo {{ argocd_gitops_repo }}
    --path {{ item.path }}
    --revision {{ argocd_gitops_revision }}
    --dest-server https://{{ _local_tailscale_ip.stdout | trim }}:{{ argocd_k8s_proxy_port | default(6443) }}
    --dest-namespace {{ item.dest_namespace }}
    --sync-policy automated
    --auto-prune
    --self-heal
    --sync-option CreateNamespace=true
    --annotations "argocd.argoproj.io/sync-wave={{ item.sync_wave | default('0') }}"
    --upsert
  loop: "{{ argocd_apps }}"
  register: _argocd_app_create
  changed_when: true
  failed_when:
    - _argocd_app_create.rc != 0
    - "'app path does not exist' not in (_argocd_app_create.stderr | default(''))"
  when:
    - argocd_register_cluster | default(false)
    - argocd_gitops_repo != ""
    - argocd_apps | length > 0

- name: Warn about missing GitOps paths
  ansible.builtin.debug:
    msg: "WARNING: {{ item.item.name }} path '{{ item.item.path }}' not yet in gitops repo — create manifests to enable sync"
  loop: "{{ _argocd_app_create.results | default([]) }}"
  when:
    - argocd_register_cluster | default(false)
    - item.rc | default(0) != 0
    - "'app path does not exist' in (item.stderr | default(''))"

# --- UNINSTALL (only when argocd_state: absent AND not a registration-only host) ---
- name: Uninstall ArgoCD
  ansible.builtin.command: helm uninstall argocd -n {{ argocd_namespace }}
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  failed_when: false
  changed_when: true
  when:
    - _argocd_state == 'absent'
    - not (argocd_register_cluster | default(false))
