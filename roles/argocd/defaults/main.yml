---
argocd_state: present
# Kubeconfig used when installing/uninstalling ArgoCD itself (management-hub k3s)
k3s_kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"
argocd_namespace: argocd
argocd_chart_version: "7.7.0"   # Helm chart version for ArgoCD 2.13.x
argocd_server: ""               # external hostname (set in group_vars)
argocd_nodeport: 30080          # NodePort for argocd-server HTTP (Tailscale-accessible)
# URL used for argocd CLI login during cluster registration.
# Defaults to management Tailscale IP + NodePort; override in host_vars if needed.
argocd_login_server: "{{ management_tailscale_ip }}:{{ argocd_nodeport }}"
# Cluster registration (set to true when running on ai-hub)
argocd_register_cluster: false
argocd_cluster_name: ""
argocd_cluster_context: ""
# Hostname of the management device as registered in Tailscale (used for dynamic IP lookup)
argocd_management_hostname: "management-hub"
# management_tailscale_ip is resolved dynamically via Tailscale API during cluster registration
management_tailscale_ip: ""
# GitOps repo for App of Apps (set in host_vars for ai-hub)
argocd_gitops_repo: ""
argocd_gitops_revision: main
# List of ArgoCD Applications to create after cluster registration
# Each: { name, path, dest_namespace, sync_wave }
argocd_apps: []
