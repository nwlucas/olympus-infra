---
argocd_state: present
argocd_namespace: argocd
argocd_chart_version: "7.7.0"   # Helm chart version for ArgoCD 2.10.x
argocd_server: ""               # external hostname (set in group_vars)
# Cluster registration (set to true when running on mac-studio)
argocd_register_cluster: false
argocd_cluster_name: ""
argocd_cluster_context: ""
# Hostname of the management device as registered in Tailscale (used for dynamic IP lookup)
argocd_management_hostname: "management"
# management_tailscale_ip is resolved dynamically via Tailscale API during cluster registration
management_tailscale_ip: ""
# ArgoCD admin password — set in group_vars/mac_studio.yml after management bootstrap prints it
argocd_admin_password: ""
