---
# node-prereqs role — installs packages, kernel modules, and basic hardening
# required for k3s HA nodes with Longhorn + democratic-csi (iSCSI) storage.

- name: Install prerequisite packages
  ansible.builtin.apt:
    name: "{{ _node_prereqs_packages + (node_prereqs_extra_packages | default([])) }}"
    state: "{{ 'present' if node_prereqs_state == 'present' else 'absent' }}"
    update_cache: true
  become: true
  vars:
    _node_prereqs_packages:
      # iSCSI — required by Longhorn (thin provisioning) and democratic-csi (QNAP SAN)
      - open-iscsi
      # NFS client — required by Longhorn RWX (NFS-backed ReadWriteMany volumes)
      - nfs-common
      # LVM — required for device management by Longhorn / Rook
      - lvm2
      # iSCSI multipath — for QNAP iSCSI multi-path I/O
      - multipath-tools
      # Kernel modules for iSCSI (module names vary; package covers the running kernel)
      - "linux-modules-extra-{{ ansible_facts['kernel'] }}"
      # Basic tooling
      - curl
      - wget
      - git
      - jq
      - htop
      - tmux
      - rsync
      # Security
      - fail2ban

- name: Enable and start iscsid
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  become: true
  when: node_prereqs_state == 'present'

- name: Enable and start multipathd
  ansible.builtin.systemd:
    name: multipathd
    enabled: true
    state: started
  become: true
  when: node_prereqs_state == 'present'
  failed_when: false   # may not be present on all kernels

# ── Kernel modules ────────────────────────────────────────────────────────────

- name: Load iSCSI kernel module
  community.general.modprobe:
    name: iscsi_tcp
    state: present
  become: true
  when: node_prereqs_state == 'present'

- name: Load dm_multipath kernel module
  community.general.modprobe:
    name: dm_multipath
    state: present
  become: true
  when: node_prereqs_state == 'present'
  failed_when: false

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/olympus.conf
    content: |
      # Loaded by Ansible (node-prereqs role) — do not edit manually
      iscsi_tcp
      dm_multipath
    owner: root
    group: root
    mode: "0644"
  become: true
  when: node_prereqs_state == 'present'

# ── Security hardening ────────────────────────────────────────────────────────

# UFW is intentionally left disabled — Tailscale enforces network policy.
# Enabling UFW would require explicit rules for k3s inter-node traffic.
- name: Disable UFW (Tailscale handles network policy)
  ansible.builtin.command: ufw disable
  become: true
  changed_when: false
  failed_when: false
  when: node_prereqs_state == 'present'

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  become: true
  when:
    - node_prereqs_state == 'present'
    - node_prereqs_fail2ban
