---
- name: Set traefik state
  ansible.builtin.set_fact:
    _traefik_state: "{{ traefik_state | default('present') }}"

# --- PRESENT ---
# Customize the k3s-bundled Traefik via HelmChartConfig (no separate Helm install)
- name: Render Traefik HelmChartConfig
  ansible.builtin.template:
    src: helmchartconfig.yaml.j2
    dest: /tmp/traefik-helmchartconfig.yaml
    mode: '0600'
  when: _traefik_state == 'present'

- name: Apply Traefik HelmChartConfig
  ansible.builtin.command: kubectl apply -f /tmp/traefik-helmchartconfig.yaml
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  when: _traefik_state == 'present'

- name: Wait for k3s to deploy/redeploy Traefik
  ansible.builtin.shell: |
    set -o pipefail
    kubectl get deployment traefik -n {{ traefik_namespace }} 2>/dev/null && \
    kubectl rollout status deployment/traefik -n {{ traefik_namespace }} --timeout=30s
  args:
    executable: /bin/bash
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: _traefik_ready
  until: _traefik_ready.rc == 0
  retries: 20
  delay: 15
  changed_when: false
  when: _traefik_state == 'present'
  ignore_errors: "{{ ansible_check_mode }}"

- name: Render Traefik dashboard IngressRoute
  ansible.builtin.template:
    src: dashboard-ingressroute.yaml.j2
    dest: /tmp/traefik-dashboard-ingressroute.yaml
    mode: '0600'
  when:
    - _traefik_state == 'present'
    - traefik_dashboard_hostname != ""

- name: Apply Traefik dashboard IngressRoute
  ansible.builtin.command: kubectl apply -f /tmp/traefik-dashboard-ingressroute.yaml
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
  when:
    - _traefik_state == 'present'
    - traefik_dashboard_hostname != ""

# --- ABSENT ---
- name: Remove Traefik HelmChartConfig customizations
  ansible.builtin.command: kubectl delete helmchartconfig traefik -n kube-system --ignore-not-found
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  failed_when: false
  changed_when: true
  when: _traefik_state == 'absent'
