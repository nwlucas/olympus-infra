---
traefik_state: present
# k3s bundles Traefik in kube-system — we customize it via HelmChartConfig
traefik_namespace: kube-system
# Dashboard IngressRoute — set to the full public hostname (e.g. traefik.nwlnexus.net)
# Leave empty to skip creating the IngressRoute
traefik_dashboard_hostname: ""
# Additional raw Helm values to pass through HelmChartConfig (YAML string)
traefik_extra_values: ""
