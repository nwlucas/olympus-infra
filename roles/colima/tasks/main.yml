---
- name: Install Colima and Docker tooling via Homebrew
  community.general.homebrew:
    name: "{{ item }}"
    state: "{{ 'present' if colima_state == 'present' else 'absent' }}"
  loop:
    - colima
    - docker
    - docker-compose
  become: false

- name: Initialize Colima VM with configured resources (first run only)
  ansible.builtin.command: >
    /opt/homebrew/bin/colima start
    --cpu {{ colima_cpu }}
    --memory {{ colima_memory }}
    --disk {{ colima_disk }}
    --foreground=false
  register: _colima_init
  changed_when: "'already running' not in (_colima_init.stderr | default('')) and _colima_init.rc == 0"
  failed_when:
    - _colima_init.rc != 0
    - "'already running' not in (_colima_init.stderr | default(''))"
  become: false
  when: colima_state == "present"

- name: Start Colima as user LaunchAgent (brew services)
  ansible.builtin.command: >
    /opt/homebrew/bin/brew services start colima
  register: _colima_start
  changed_when: "'Successfully started' in _colima_start.stdout"
  failed_when:
    - _colima_start.rc != 0
    - "'already started' not in (_colima_start.stderr | default(''))"
  become: false
  when: colima_state == "present"

- name: Stop and remove Colima
  ansible.builtin.command: /opt/homebrew/bin/brew services stop colima
  register: _colima_stop
  failed_when: false
  changed_when: "'Successfully stopped' in _colima_stop.stdout"
  become: false
  when: colima_state == "absent"
