---
# Management Hub vars for ansible-pull (pull-mode, health checks only)
# Secrets come from 1Password Connect via External Secrets Operator
ansible_user: ansible

# k3s
k3s_state: present
k3s_role: server

# Tailscale
tailscale_state: present
tailscale_hostname: management-hub

# Cloudflared (binary only; tunnel + Deployment run in k3s via GitOps)
cloudflared_state: present

# 1Password Connect — still managed by Ansible (prerequisite for ESO)
onepassword_connect_state: present

# ArgoCD — still managed by Ansible (prerequisite for GitOps)
argocd_state: present
