---
# AI Hub vars — OrbStack k8s retired; host is now Ollama-only
ansible_user: ansible

# Ollama
ollama_state: present
ollama_service_port: 11434
ollama_models:
  - glm-4.7-flash:latest
  - llama3.3:70b
  - nomic-embed-text

# LiteLLM — moved to management-hub k8s
litellm_state: absent
litellm_port: 4000
litellm_config_dest: /opt/litellm/config.yaml

# Tailscale
tailscale_state: present
tailscale_hostname: ai-hub

# Cloudflared binary present (tunnel deleted — binary kept for potential future use)
cloudflared_state: present
