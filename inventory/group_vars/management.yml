---
# Management host vars for ansible-pull (pull-mode, health checks only)
# Secrets come from 1Password Connect via External Secrets Operator
ansible_user: ansible

# k3s
k3s_state: present
k3s_role: server

# Tailscale
tailscale_state: present
tailscale_hostname: management

# Cloudflared (binary only; tunnel runs in k3s)
cloudflared_state: present
